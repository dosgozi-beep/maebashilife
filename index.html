<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>マエバシライフ｜前橋を、暮らす。</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Orbitron:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700;900&family=Zen+Kurenaido&family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg-deep: #050a1a;
    --bg-mid: #0a1628;
    --bg-card: #0d1b3a;
    --cyan: #00e5ff;
    --cyan-dim: #4dd0e1;
    --magenta: #ff4d9f;
    --green: #00ff88;
    --yellow: #ffd93d;
    --orange: #ff8a5c;
    --teten: #7cffb0;
    --ink: #eaf4ff;
    --ink-dim: #8aa3c7;
    --grid: rgba(0,229,255,0.08);
  }

  html, body {
    height: 100%;
    font-family: 'Noto Sans JP', sans-serif;
    color: var(--ink);
    background:
      radial-gradient(ellipse at 20% 10%, rgba(0,229,255,0.12), transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(255,77,159,0.10), transparent 55%),
      linear-gradient(180deg, #02050f 0%, #050a1a 50%, #02050f 100%);
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* ---------- Stage ---------- */
  .stage {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 400px 1fr;
    align-items: center;
    gap: 30px;
    padding: 32px 24px;
    position: relative;
  }

  .stage::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 40px 40px;
    mask-image: radial-gradient(ellipse at center, black 20%, transparent 75%);
    pointer-events: none;
    z-index: 0;
  }

  .side-panel { position: relative; z-index: 1; max-width: 340px; }
  .side-panel.left { justify-self: end; }
  .side-panel.right { justify-self: start; }

  .brand {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 12px;
    border: 1px solid rgba(0,229,255,0.4);
    border-radius: 100px;
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--cyan);
    background: rgba(0,229,255,0.06);
  }
  .brand-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 10px var(--cyan);
    animation: pulse 2s ease-in-out infinite;
  }
  .side-title {
    font-family: 'Zen Kurenaido', 'Noto Sans JP', serif;
    font-size: 42px;
    line-height: 1.1;
    margin: 16px 0 12px;
    color: var(--ink);
    text-shadow: 0 0 30px rgba(0,229,255,0.3);
  }
  .side-title .accent {
    color: var(--cyan);
    background: linear-gradient(180deg, #7ff5ff, #00e5ff);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .side-sub { font-size: 13px; line-height: 1.9; color: var(--ink-dim); margin-bottom: 20px; }
  .side-caption {
    font-family: 'DotGothic16', monospace;
    font-size: 11px; color: var(--magenta);
    letter-spacing: 0.15em; margin-bottom: 8px;
  }
  .feature-list { list-style: none; display: grid; gap: 10px; }
  .feature-list li {
    display: flex; gap: 12px; align-items: flex-start;
    padding: 12px 14px;
    border: 1px solid rgba(0,229,255,0.15);
    border-radius: 10px;
    background: linear-gradient(180deg, rgba(0,229,255,0.05), rgba(0,229,255,0.01));
    font-size: 12px; line-height: 1.65;
  }
  .feature-num {
    flex: 0 0 28px; height: 28px;
    display: grid; place-items: center;
    font-family: 'Orbitron', sans-serif;
    font-size: 13px; font-weight: 700;
    color: var(--bg-deep); background: var(--cyan);
    border-radius: 6px;
    box-shadow: 0 0 14px rgba(0,229,255,0.5);
  }
  .feature-list li strong { display: block; color: var(--cyan-dim); font-size: 12.5px; margin-bottom: 2px; }
  .feature-list li span { color: var(--ink-dim); }

  /* ---------- Phone ---------- */
  .phone-wrap { position: relative; z-index: 2; justify-self: center; }
  .phone-glow {
    position: absolute; inset: -60px;
    background:
      radial-gradient(ellipse at center, rgba(0,229,255,0.25), transparent 60%),
      radial-gradient(ellipse at 70% 30%, rgba(255,77,159,0.15), transparent 55%);
    filter: blur(30px);
    pointer-events: none;
  }
  .phone {
    position: relative;
    width: 380px;
    height: 780px;
    background: #000;
    border-radius: 48px;
    padding: 12px;
    box-shadow:
      0 0 0 2px #1a2a4a,
      0 0 0 3px #0a1020,
      0 0 60px rgba(0,229,255,0.25),
      0 30px 80px rgba(0,0,0,0.6);
  }
  .phone::before {
    content: ""; position: absolute;
    top: 22px; left: 50%; transform: translateX(-50%);
    width: 110px; height: 28px;
    background: #000;
    border-radius: 100px;
    z-index: 10;
    box-shadow: inset 0 0 0 2px #1a2a4a;
  }
  .phone::after {
    content: ""; position: absolute;
    top: 33px; left: 50%; transform: translateX(20px);
    width: 8px; height: 8px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #3a4a7a, #050a1a);
    z-index: 11;
  }
  .screen-container {
    position: relative;
    width: 100%; height: 100%;
    border-radius: 36px;
    overflow: hidden;
    background: var(--bg-deep);
  }
  .status-bar {
    position: absolute; top: 0; left: 0; right: 0;
    height: 54px;
    padding: 16px 32px 0;
    display: flex; justify-content: space-between; align-items: center;
    font-family: 'Orbitron', sans-serif;
    font-size: 13px; font-weight: 700;
    color: white;
    z-index: 20;
    pointer-events: none;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  }
  .status-icons::before {
    content: "••• 📶 🔋"; letter-spacing: 2px; font-size: 11px;
  }

  .screen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    opacity: 0; pointer-events: none;
    transition: opacity 0.4s ease;
  }
  .screen.active { opacity: 1; pointer-events: auto; }

  /* =============================================================
     HOME SCREEN
     ============================================================= */
  /* #screen-home now styled in ROOM CHAT section below */

  .tama-home {
    position: relative;
    flex: 1;
    padding-top: 54px;
    padding-bottom: 86px;
    display: flex;
    flex-direction: column;
  }

  /* App logo — top-left corner of home screen */
  .mae-logo {
    position: absolute;
    top: 12px;
    left: 12px;
    z-index: 10;
    width: 130px;
    pointer-events: none;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
  }
  .mae-logo-svg {
    width: 100%;
    height: auto;
    display: block;
  }
  .mae-logo-star {
    animation: logoStarSpin 4s ease-in-out infinite;
    transform-origin: 0 0;
  }
  @keyframes logoStarSpin {
    0%, 100% { transform: translate(6px, 8px) rotate(0deg) scale(1); }
    25% { transform: translate(6px, 8px) rotate(90deg) scale(1.15); }
    50% { transform: translate(6px, 8px) rotate(180deg) scale(1); }
    75% { transform: translate(6px, 8px) rotate(270deg) scale(1.15); }
  }
  .mae-logo-ufo {
    animation: logoUfoFloat 3s ease-in-out infinite;
  }
  @keyframes logoUfoFloat {
    0%, 100% { transform: translate(162px, 12px); }
    50% { transform: translate(159px, 10px); }
  }
  .mae-logo-cat {
    animation: logoCatBlink 4s ease-in-out infinite;
    transform-origin: 18px 32px;
  }
  @keyframes logoCatBlink {
    0%, 94%, 100% { transform: translate(18px, 32px) scaleY(1); }
    97% { transform: translate(18px, 32px) scaleY(0.1); }
  }
  .mae-logo-sparkles circle {
    animation: logoSparkle 2s ease-in-out infinite;
  }
  .mae-logo-sparkles circle:nth-child(2) { animation-delay: 0.6s; }
  .mae-logo-sparkles circle:nth-child(3) { animation-delay: 1.2s; }
  @keyframes logoSparkle {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.5); }
  }

  .room-bg-soft::before {
    /* Slight darkening for text contrast */
    content: "";
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg, rgba(10,6,20,0.55) 0%, rgba(10,6,20,0.25) 35%, rgba(10,6,20,0.45) 100%);
  }
  .room-bg-soft::after {
    /* Floating sparkle dots (firefly-like) */
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle at 15% 25%, rgba(255,255,255,0.7) 1px, transparent 2px),
      radial-gradient(circle at 85% 15%, rgba(255,217,61,0.7) 1px, transparent 2px),
      radial-gradient(circle at 75% 60%, rgba(255,255,255,0.6) 1px, transparent 2px),
      radial-gradient(circle at 25% 75%, rgba(255,200,255,0.6) 1px, transparent 2px),
      radial-gradient(circle at 50% 40%, rgba(124,255,176,0.7) 1px, transparent 2px),
      radial-gradient(circle at 10% 50%, rgba(255,255,255,0.5) 1px, transparent 2px);
    background-size: 100% 100%;
    animation: hiroseSparkle 4s ease-in-out infinite;
  }
  @keyframes hiroseSparkle {
    0%, 100% { opacity: 0.8; }
    50% { opacity: 0.4; }
  }

  /* Character stage - cat and teten standing on the bridge ground */
  .room-stage {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 4;
    pointer-events: none;
  }
  .room-character {
    position: absolute;
    pointer-events: auto;
  }
  .room-character img {
    width: 100%;
    height: auto;
    display: block;
    filter: drop-shadow(0 8px 20px rgba(0,0,0,0.6));
  }
  .room-character.cat-char {
    width: 150px;
    bottom: 22%;
    left: 14%;
    animation: charBob 3.2s ease-in-out infinite;
  }
  .room-character.teten-char {
    width: 130px;
    bottom: 22%;
    right: 14%;
    animation: charBob 3.5s ease-in-out infinite 0.4s;
  }
  /* When chat is "talking", characters wiggle more energetically */
  .room-character.talking {
    animation: charTalking 0.45s ease-in-out infinite !important;
  }
  /* When listening (other one is talking), gentle attentive sway */
  .room-character.listening {
    animation: charListening 1.2s ease-in-out infinite !important;
  }
  @keyframes charBob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  @keyframes charTalking {
    0%, 100% { transform: translateY(0) rotate(-2deg) scale(1); }
    25% { transform: translateY(-6px) rotate(0deg) scale(1.04); }
    50% { transform: translateY(0) rotate(2deg) scale(1); }
    75% { transform: translateY(-6px) rotate(0deg) scale(1.04); }
  }
  @keyframes charListening {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-2px) rotate(1.5deg); }
  }
  /* Subtle glow under each character (on the bridge surface) */
  .room-character::after {
    content: "";
    position: absolute;
    bottom: -8px; left: 50%;
    transform: translateX(-50%);
    width: 70%;
    height: 12px;
    background: radial-gradient(ellipse, rgba(0,229,255,0.55), transparent 70%);
    filter: blur(6px);
    animation: pulse 2.5s ease-in-out infinite;
  }
  .room-character.teten-char::after {
    background: radial-gradient(ellipse, rgba(124,255,176,0.55), transparent 70%);
  }
  /* Brighten the glow when talking */
  .room-character.talking::after {
    animation: glowPulse 0.5s ease-in-out infinite !important;
  }
  @keyframes glowPulse {
    0%, 100% { opacity: 0.7; transform: translateX(-50%) scale(1); }
    50% { opacity: 1; transform: translateX(-50%) scale(1.3); }
  }

  .room-header {
    position: relative;
    z-index: 5;
    margin-top: 78px;
    margin-left: 16px;
    margin-right: 16px;
    margin-bottom: 8px;
    padding: 12px 14px;
    background: rgba(10,6,20,0.55);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }
  .room-avatars {
    position: relative;
    display: flex;
    align-items: center;
  }
  .room-avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid;
    flex-shrink: 0;
    position: relative;
  }
  .room-avatar.cat {
    border-color: var(--cyan);
    background: #0a2028;
    box-shadow: 0 0 12px rgba(0,229,255,0.4);
  }
  .room-avatar.teten {
    border-color: var(--teten, #7cffb0);
    background: linear-gradient(135deg, #6a7a9e, #485878);
    box-shadow: 0 0 12px rgba(124,255,176,0.4);
    margin-left: -10px;
    z-index: 2;
  }
  .room-avatar.cat img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center 28%;
    transform: scale(1.15);
  }
  .room-avatar.teten img {
    position: absolute;
    width: 180%; height: 180%;
    top: -8%; left: -40%;
    object-fit: contain;
    object-position: center top;
  }
  .room-title {
    flex: 1;
    min-width: 0;
  }
  .room-title-text {
    font-family: 'M PLUS Rounded 1c', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: #f8eecd;
    line-height: 1.2;
  }
  .room-title-status {
    font-family: 'DotGothic16', monospace;
    font-size: 9.5px;
    color: #ffd9a8;
    margin-top: 3px;
    letter-spacing: 0.1em;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #7cffb0;
    box-shadow: 0 0 6px #7cffb0;
    animation: pulse 1.8s ease-in-out infinite;
  }

  .room-chat {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px 200px;
    position: relative;
    z-index: 5;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scrollbar-width: none;
    min-height: 0;
    -webkit-mask-image: linear-gradient(180deg, black 0%, black 80%, transparent 100%);
    mask-image: linear-gradient(180deg, black 0%, black 80%, transparent 100%);
  }
  .room-chat::-webkit-scrollbar { display: none; }

  .room-msg-row {
    display: flex;
    gap: 8px;
    align-items: flex-start;
    max-width: 88%;
    animation: roomSlideUp 0.4s ease backwards;
  }
  .room-msg-row.cat { align-self: flex-start; }
  .room-msg-row.teten { align-self: flex-end; flex-direction: row-reverse; }
  .room-msg-row.user { align-self: center; max-width: 92%; justify-content: center; }
  .room-msg-row.system { align-self: center; max-width: 92%; }

  @keyframes roomSlideUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .room-msg-avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
    border: 2px solid;
    position: relative;
    margin-top: 2px;
  }
  .room-msg-avatar.cat {
    border-color: var(--cyan);
    background: #0a2028;
  }
  .room-msg-avatar.cat img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center 28%;
    transform: scale(1.15);
  }
  .room-msg-avatar.teten {
    border-color: var(--teten, #7cffb0);
    background: linear-gradient(135deg, #6a7a9e, #485878);
  }
  .room-msg-avatar.teten img {
    position: absolute;
    width: 180%; height: 180%;
    top: -8%; left: -40%;
    object-fit: contain;
    object-position: center top;
  }
  .room-msg-avatar.user {
    border-color: var(--magenta);
    background: linear-gradient(135deg, #ff4d9f, #c93c82);
    display: grid; place-items: center;
    font-size: 14px;
    color: white;
  }

  .room-bubble {
    padding: 10px 13px;
    border-radius: 14px;
    font-size: 13px;
    line-height: 1.6;
    font-family: 'M PLUS Rounded 1c', sans-serif;
    max-width: calc(100% - 38px);
    word-wrap: break-word;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  .room-bubble.cat {
    background: rgba(255,255,255,0.94);
    border: 1.5px solid #2a1a4a;
    color: #2a1a4a;
    border-top-left-radius: 4px;
    box-shadow: 2px 2px 0 rgba(0,0,0,0.25), 0 0 14px rgba(0,229,255,0.3);
  }
  .room-bubble.teten {
    background: rgba(232,248,237,0.94);
    border: 1.5px solid #2a4a1a;
    color: #1a3a0e;
    border-top-right-radius: 4px;
    box-shadow: 2px 2px 0 rgba(0,0,0,0.25), 0 0 14px rgba(124,255,176,0.3);
  }
  .room-bubble.user {
    background: linear-gradient(135deg, #ff4d9f, #c93c82);
    color: white;
    font-weight: 700;
    font-size: 14px;
    padding: 10px 16px;
    box-shadow:
      2px 2px 0 rgba(0,0,0,0.3),
      0 0 24px rgba(255,77,159,0.5);
    transform-origin: center;
    animation: userPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
    position: relative;
  }
  @keyframes userPop {
    0% {
      opacity: 0;
      transform: translateY(20px) scale(0.5) rotate(-8deg);
    }
    60% {
      opacity: 1;
      transform: translateY(-4px) scale(1.1) rotate(2deg);
    }
    100% {
      opacity: 1;
      transform: translateY(0) scale(1) rotate(0deg);
    }
  }
  /* Sparkle effects on user reply */
  .room-bubble.user::before {
    content: "✨";
    position: absolute;
    top: -8px; left: -8px;
    font-size: 16px;
    animation: sparkleA 0.8s ease forwards;
  }
  .room-bubble.user::after {
    content: "💫";
    position: absolute;
    bottom: -8px; right: -8px;
    font-size: 16px;
    animation: sparkleB 0.8s ease 0.1s forwards;
  }
  @keyframes sparkleA {
    0% { opacity: 0; transform: scale(0) rotate(0deg); }
    60% { opacity: 1; transform: scale(1.4) rotate(180deg); }
    100% { opacity: 0; transform: scale(0.8) rotate(360deg); }
  }
  @keyframes sparkleB {
    0% { opacity: 0; transform: scale(0) rotate(0deg); }
    60% { opacity: 1; transform: scale(1.4) rotate(-180deg); }
    100% { opacity: 0; transform: scale(0.8) rotate(-360deg); }
  }
  .room-bubble.system {
    background: rgba(10,6,20,0.6);
    border: 1px dashed rgba(255,217,61,0.6);
    color: #ffd9a8;
    text-align: center;
    font-size: 11px;
    font-family: 'DotGothic16', monospace;
    padding: 8px 12px;
    letter-spacing: 0.05em;
  }
  .room-bubble .speaker-tag {
    display: block;
    font-family: 'DotGothic16', monospace;
    font-size: 8.5px;
    letter-spacing: 0.15em;
    margin-bottom: 3px;
    opacity: 0.7;
    font-weight: 700;
  }
  .room-bubble.cat .speaker-tag { color: #2a1a4a; }
  .room-bubble.teten .speaker-tag { color: #1a3a0e; }

  .room-typing {
    display: inline-flex;
    gap: 4px;
    padding: 4px 0;
    align-items: center;
    height: 20px;
  }
  .room-typing span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.5;
    animation: roomTyping 1.2s ease-in-out infinite;
  }
  .room-typing span:nth-child(2) { animation-delay: 0.15s; }
  .room-typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes roomTyping {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  .room-replies {
    position: relative;
    z-index: 8;
    padding: 12px 16px 14px;
    margin-bottom: 86px;
    min-height: 60px;
    flex-shrink: 0;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    background: linear-gradient(180deg, transparent 0%, rgba(10,6,20,0.7) 30%, rgba(10,6,20,0.92) 100%);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid rgba(255,255,255,0.12);
    transition: box-shadow 0.4s ease;
  }
  /* Spotlight pulse when waiting for user input */
  .room-replies.awaiting {
    box-shadow:
      0 -10px 40px rgba(255,217,61,0.35) inset,
      0 0 0 2px rgba(255,217,61,0.55);
    animation: repliesPulse 1.4s ease-in-out infinite;
  }
  @keyframes repliesPulse {
    0%, 100% {
      box-shadow:
        0 -10px 40px rgba(255,217,61,0.25) inset,
        0 0 0 2px rgba(255,217,61,0.4);
    }
    50% {
      box-shadow:
        0 -16px 50px rgba(255,217,61,0.55) inset,
        0 0 0 3px rgba(255,217,61,0.8),
        0 -4px 30px rgba(255,217,61,0.4);
    }
  }
  /* "Tap one!" hint above the replies */
  .room-replies::before {
    content: "↓ あなたのターン";
    position: absolute;
    top: -22px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'DotGothic16', monospace;
    font-size: 10px;
    color: #ffd93d;
    letter-spacing: 0.2em;
    background: rgba(10,6,20,0.85);
    padding: 4px 12px;
    border-radius: 100px;
    border: 1px solid rgba(255,217,61,0.6);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
    white-space: nowrap;
    box-shadow: 0 2px 12px rgba(255,217,61,0.4);
  }
  .room-replies.awaiting::before {
    opacity: 1;
    animation: hintBob 1.4s ease-in-out infinite;
  }
  @keyframes hintBob {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(-3px); }
  }
  .room-reply {
    background: rgba(255,255,255,0.96);
    border: 1.5px solid #2a1a4a;
    color: #2a1a4a;
    padding: 10px 16px;
    border-radius: 100px;
    font-size: 12px;
    font-family: 'M PLUS Rounded 1c', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
    box-shadow: 2px 2px 0 rgba(0,0,0,0.3);
    animation: replyPopIn 0.4s ease backwards;
  }
  .room-reply:nth-child(1) { animation-delay: 0.05s; }
  .room-reply:nth-child(2) { animation-delay: 0.12s; }
  .room-reply:nth-child(3) { animation-delay: 0.19s; }
  .room-reply:nth-child(4) { animation-delay: 0.26s; }
  .room-reply:nth-child(5) { animation-delay: 0.33s; }
  .room-reply:nth-child(6) { animation-delay: 0.40s; }
  @keyframes replyPopIn {
    from {
      opacity: 0;
      transform: translateY(12px) scale(0.85);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }
  .room-reply:active {
    transform: scale(0.93);
    box-shadow: 1px 1px 0 rgba(0,0,0,0.3);
  }
  .room-reply:hover {
    background: white;
    transform: translateY(-2px);
    box-shadow: 3px 4px 0 rgba(0,0,0,0.35), 0 0 16px rgba(255,217,61,0.4);
  }
  .room-reply.primary {
    background: linear-gradient(135deg, #ff4d9f, #c93c82);
    border-color: #c93c82;
    color: white;
    font-weight: 800;
    box-shadow: 2px 2px 0 rgba(0,0,0,0.3), 0 4px 14px rgba(255,77,159,0.4);
  }
  .room-reply.go-zukan {
    background: linear-gradient(135deg, #ff8a4d, #c95a2a);
    border-color: #c95a2a;
    color: white;
    font-weight: 800;
    box-shadow: 2px 2px 0 rgba(0,0,0,0.3), 0 4px 14px rgba(255,138,77,0.45);
  }
  /* Picked button stays briefly, others fade out */
  .room-reply.picked {
    animation: replyPicked 0.5s ease forwards;
    pointer-events: none;
  }
  .room-reply.faded {
    animation: replyFaded 0.4s ease forwards;
    pointer-events: none;
  }
  @keyframes replyPicked {
    0% { transform: scale(1); }
    40% { transform: scale(1.1); box-shadow: 0 0 30px rgba(255,217,61,0.9); }
    100% { transform: scale(1.05); opacity: 0; }
  }
  @keyframes replyFaded {
    to { opacity: 0; transform: scale(0.8); }
  }

  /* Status panel */
  .tama-status {
    position: relative; z-index: 5;
    padding: 8px 10px 0;
    margin-top: 40px;
    display: grid;
    grid-template-columns: 1fr 1fr auto auto;
    gap: 5px;
    align-items: center;
  }
  .tama-stat {
    background: rgba(255,255,255,0.94);
    border: 2px solid #2a1a4a;
    border-radius: 10px;
    padding: 3px 6px;
    display: flex; align-items: center; gap: 4px;
    box-shadow: 0 2px 0 rgba(42,26,74,0.6);
    min-width: 0;
  }
  .tama-stat-icon {
    width: 14px; height: 14px;
    display: grid; place-items: center;
    font-size: 11px;
    flex-shrink: 0;
  }
  .tama-stat-body { flex: 1; min-width: 0; }
  .tama-stat-label {
    font-family: 'DotGothic16', monospace;
    font-size: 8px;
    color: #3a2a5a;
    letter-spacing: 0;
    line-height: 1;
    white-space: nowrap;
  }
  .tama-stat-bar {
    width: 100%; height: 5px;
    background: #e5d5c3;
    border-radius: 100px;
    overflow: hidden;
    margin-top: 2px;
    border: 1px solid #3a2a5a;
  }
  .tama-stat-fill {
    height: 100%;
    border-radius: 100px;
    transition: width 0.6s;
  }
  .stat-fullness .tama-stat-fill { width: 72%; background: linear-gradient(90deg, #ffb84d, #ff8a5c); }
  .stat-mood .tama-stat-fill { width: 85%; background: linear-gradient(90deg, #00e5ff, #00ff88); }
  .tama-stat-val {
    font-family: 'Orbitron', sans-serif;
    font-size: 9px; font-weight: 900;
    color: #3a2a5a; line-height: 1;
    flex-shrink: 0;
  }
  .tama-coins, .tama-days {
    background: rgba(255,255,255,0.94);
    border: 2px solid #2a1a4a;
    border-radius: 10px;
    padding: 4px 7px;
    display: flex; align-items: center; gap: 3px;
    font-family: 'DotGothic16', monospace;
    font-size: 10px;
    color: #2a1a4a;
    box-shadow: 0 2px 0 rgba(42,26,74,0.6);
    white-space: nowrap;
  }
  .tama-coins .coin-icon {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #fff6c2, #ffd93d 50%, #c9a030);
    display: grid; place-items: center;
    font-size: 7px; font-weight: 900;
    color: #5a3f0a;
  }
  .tama-coins .coin-icon::before { content: "¥"; }

  /* Window - using bg_window.png */
  .tama-window {
    position: relative;
    z-index: 3;
    margin: 10px 14px 0;
    height: 100px;
    border: 4px solid #2a1a4a;
    border-radius: 14px;
    overflow: hidden;
    box-shadow:
      inset 0 2px 4px rgba(0,0,0,0.2),
      0 4px 0 rgba(42,26,74,0.5);
  }
  .tama-window img {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center 60%;
  }
  .tama-window::before {
    content: ""; position: absolute; inset: 0;
    background:
      linear-gradient(90deg, transparent 49%, rgba(42,26,74,0.9) 49%, rgba(42,26,74,0.9) 51%, transparent 51%),
      linear-gradient(0deg, transparent 49%, rgba(42,26,74,0.9) 49%, rgba(42,26,74,0.9) 51%, transparent 51%);
    z-index: 5;
    pointer-events: none;
  }
  .window-label {
    position: absolute;
    bottom: 4px; left: 8px;
    font-family: 'DotGothic16', monospace;
    font-size: 9px;
    color: rgba(255,255,255,0.9);
    z-index: 6;
    letter-spacing: 0.1em;
    text-shadow: 0 1px 2px rgba(0,0,0,0.7);
  }

  /* Room - using bg_room.png */
  .tama-room {
    position: relative;
    flex: 1;
    margin: 10px 14px 0;
    border: 4px solid #2a1a4a;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 4px 0 rgba(42,26,74,0.5);
    background: #2a1a0a;
  }
  .room-bg {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center 70%;
  }

  /* ---------- Maebashi Product Shelf ---------- */
  .mae-shelf {
    position: absolute;
    top: 12%;
    left: 5%;
    width: 38%;
    z-index: 3;
    pointer-events: none;
  }
  .mae-shelf-label {
    position: absolute;
    top: -18px; left: 0;
    font-family: 'DotGothic16', monospace;
    font-size: 9px;
    color: #fff;
    background: rgba(42,26,74,0.92);
    padding: 2px 6px;
    border-radius: 4px;
    letter-spacing: 0.1em;
    border: 1px solid rgba(255,217,61,0.5);
    box-shadow: 0 0 8px rgba(255,217,61,0.3);
  }
  .mae-shelf-label .emoji { margin-right: 3px; }

  .shelf-row {
    position: relative;
    height: 32px;
    margin-bottom: 6px;
    display: flex;
    align-items: flex-end;
    justify-content: space-around;
    padding: 0 4px 3px;
    pointer-events: auto;
  }
  .shelf-row::after {
    /* wooden plank */
    content: "";
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(180deg, #8b5a3c 0%, #6a3f20 50%, #3a2010 100%);
    border-radius: 1px;
    box-shadow:
      0 1px 0 rgba(0,0,0,0.4),
      inset 0 1px 0 rgba(255,200,150,0.3);
  }
  .shelf-row::before {
    /* wood grain lines */
    content: "";
    position: absolute;
    bottom: 1px; left: 0; right: 0;
    height: 2px;
    background: repeating-linear-gradient(90deg,
      rgba(58,32,16,0.3) 0px,
      rgba(58,32,16,0.3) 2px,
      transparent 2px,
      transparent 8px);
    z-index: 1;
  }

  .shelf-item {
    position: relative;
    width: 22px; height: 26px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.2s;
    z-index: 2;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,0.4));
  }
  .shelf-item:hover {
    transform: translateY(-3px) scale(1.15);
    z-index: 10;
  }
  .shelf-item:active { transform: translateY(-1px) scale(1.05); }

  .shelf-item .item-label {
    position: absolute;
    bottom: 110%;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10,22,40,0.95);
    color: var(--yellow);
    font-family: 'DotGothic16', monospace;
    font-size: 8.5px;
    padding: 3px 6px;
    border-radius: 4px;
    white-space: nowrap;
    border: 1px solid rgba(255,217,61,0.5);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
    z-index: 15;
  }
  .shelf-item:hover .item-label { opacity: 1; }

  /* Individual product styles - each is a tiny illustrated object */
  /* Yakimanju - skewer with 4 round buns */
  .item-yakimanju {
    width: 24px;
  }
  .item-yakimanju::before {
    content: "";
    position: absolute;
    bottom: 2px; left: 50%;
    transform: translateX(-50%);
    width: 2px; height: 22px;
    background: linear-gradient(180deg, #d4a373 0%, #8b5a3c 100%);
  }
  .item-yakimanju-buns {
    position: relative;
    width: 20px; height: 24px;
  }
  .item-yakimanju-buns::before,
  .item-yakimanju-buns::after {
    content: "";
    position: absolute;
    left: 50%; transform: translateX(-50%);
    width: 10px; height: 7px;
    background: radial-gradient(ellipse at 30% 30%, #d4a373, #8b5a3c 70%, #3a2010);
    border-radius: 50%;
  }
  .item-yakimanju-buns::before { top: 2px; }
  .item-yakimanju-buns::after { top: 11px; }

  /* Sake bottle */
  .item-sake {
    flex-direction: column;
    align-items: center;
  }
  .item-sake-bottle {
    width: 10px; height: 22px;
    background: linear-gradient(180deg,
      #2a3a5a 0%,
      #0d1b3a 30%,
      #0a1628 100%);
    border-radius: 2px 2px 3px 3px;
    position: relative;
    box-shadow: inset -2px 0 3px rgba(0,0,0,0.4), inset 2px 0 2px rgba(255,255,255,0.08);
  }
  .item-sake-bottle::before {
    content: "";
    position: absolute;
    top: -3px; left: 50%;
    transform: translateX(-50%);
    width: 4px; height: 5px;
    background: #3a2010;
    border-radius: 1px 1px 0 0;
  }
  .item-sake-bottle::after {
    content: "";
    position: absolute;
    top: 8px; left: 1px; right: 1px;
    height: 7px;
    background: linear-gradient(180deg, #ffd93d, #c9a030);
    border-radius: 1px;
    box-shadow: 0 0 3px rgba(255,217,61,0.5);
  }

  /* Daruma */
  .item-daruma {
    width: 20px;
  }
  .item-daruma-body {
    width: 18px; height: 22px;
    background:
      radial-gradient(ellipse at 35% 25%, #ff8a5c 0%, #d9342a 60%, #8a1a12 100%);
    border-radius: 50% 50% 45% 45%;
    position: relative;
    border: 1px solid rgba(0,0,0,0.3);
    box-shadow: inset -2px -2px 4px rgba(0,0,0,0.3);
  }
  .item-daruma-body::before {
    /* eye */
    content: "";
    position: absolute;
    top: 8px; left: 4px;
    width: 3px; height: 3px;
    background: white;
    border-radius: 50%;
    box-shadow: 7px 0 0 white;
  }
  .item-daruma-body::after {
    /* mouth area / beard */
    content: "";
    position: absolute;
    bottom: 4px; left: 50%;
    transform: translateX(-50%);
    width: 10px; height: 5px;
    background: radial-gradient(ellipse, rgba(255,255,255,0.9), rgba(255,255,255,0));
    border-radius: 50%;
  }

  /* Coffee bag */
  .item-coffee {
    width: 22px;
  }
  .item-coffee-bag {
    width: 20px; height: 22px;
    background: linear-gradient(180deg, #3a2010 0%, #5a3018 100%);
    border-radius: 2px 2px 4px 4px;
    position: relative;
    border: 1px solid #1a0d08;
  }
  .item-coffee-bag::before {
    content: "☕";
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 10px;
    color: #ffd93d;
  }
  .item-coffee-bag::after {
    /* top fold */
    content: "";
    position: absolute;
    top: -2px; left: -1px; right: -1px;
    height: 4px;
    background: #1a0d08;
    border-radius: 2px 2px 0 0;
  }

  /* Miso bun / harajima */
  .item-miso {
    width: 22px;
  }
  .item-miso-bun {
    width: 20px; height: 16px;
    background:
      radial-gradient(ellipse at 35% 30%, #f5d3a0 0%, #d4a373 60%, #a67847 100%);
    border-radius: 50%;
    position: relative;
    margin-bottom: 2px;
    border: 1px solid rgba(0,0,0,0.2);
  }
  .item-miso-bun::before {
    content: "";
    position: absolute;
    top: -3px; left: 50%;
    transform: translateX(-50%);
    width: 8px; height: 6px;
    background: #c93c82;
    border-radius: 2px;
    clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);

  /* Silk / weaving */
  .item-silk {
    width: 20px;
  }
  .item-silk-roll {
    width: 18px; height: 20px;
    background:
      linear-gradient(135deg,
        #ff4d9f 0%,
        #c93c82 25%,
        #7a2a5a 50%,
        #c93c82 75%,
        #ff4d9f 100%);
    border-radius: 3px;
    position: relative;
    border: 1px solid rgba(0,0,0,0.3);
    box-shadow: inset 0 0 4px rgba(0,0,0,0.2);
  }
  .item-silk-roll::before {
    content: "";
    position: absolute;
    top: 4px; left: 0; right: 0;
    height: 1px;
    background: rgba(255,217,61,0.8);
    box-shadow: 0 4px 0 rgba(255,217,61,0.6), 0 8px 0 rgba(255,217,61,0.6), 0 12px 0 rgba(255,217,61,0.6);
  }

  /* Tonton - pig illustration (pork dish specialty) */
  .item-tonton {
    width: 22px;
  }
  .item-tonton-bowl {
    width: 20px; height: 14px;
    background: linear-gradient(180deg, #d4a373 0%, #8b5a3c 60%, #3a2010 100%);
    border-radius: 0 0 10px 10px;
    position: relative;
    border: 1px solid #1a0d08;
    margin-bottom: 0;
  }
  .item-tonton-bowl::before {
    /* pork on top - pink */
    content: "";
    position: absolute;
    top: -5px; left: 2px; right: 2px;
    height: 7px;
    background: linear-gradient(180deg, #ffb3cc 0%, #ff6b9d 100%);
    border-radius: 50% 50% 20% 20%;
  }
  .item-tonton-bowl::after {
    /* steam */
    content: "〜";
    position: absolute;
    top: -13px; left: 50%;
    transform: translateX(-50%);
    font-size: 8px;
    color: white;
    opacity: 0.7;
  }

  /* Mochi box / kaiseki */
  .item-mochi {
    width: 20px;
  }
  .item-mochi-box {
    width: 18px; height: 18px;
    background: linear-gradient(180deg, #fff 0%, #f5e6d3 100%);
    border: 1.5px solid #8b5a3c;
    border-radius: 2px;
    position: relative;
  }
  .item-mochi-box::before {
    content: "";
    position: absolute;
    top: 50%; left: 0; right: 0;
    height: 2px;
    background: #c93c82;
    transform: translateY(-50%);
    box-shadow: 0 0 4px rgba(201,60,130,0.5);
  }
  .item-mochi-box::after {
    content: "";
    position: absolute;
    top: 0; left: 50%; bottom: 0;
    width: 2px;
    background: #c93c82;
    transform: translateX(-50%);
    box-shadow: 0 0 4px rgba(201,60,130,0.5);
  }

  /* Shelf backboard (subtle) */
  .shelf-backing {
    position: absolute;
    top: -4px;
    left: -4px;
    right: -4px;
    bottom: -4px;
    background: linear-gradient(180deg,
      rgba(42,26,74,0.15) 0%,
      rgba(42,26,74,0.08) 100%);
    border-left: 2px solid rgba(58,32,16,0.4);
    border-right: 2px solid rgba(58,32,16,0.4);
    z-index: -1;
    border-radius: 2px;
  }

  /* Tap hint */
  .tap-hint {
    position: absolute;
    top: 8px; right: 10px;
    font-family: 'DotGothic16', monospace;
    font-size: 9px;
    color: #2a1a4a;
    background: rgba(255,255,255,0.85);
    padding: 3px 7px;
    border-radius: 4px;
    z-index: 8;
    animation: pulse 2s ease-in-out infinite;
    font-weight: 700;
  }

  /* Speech bubble */
  .cat-speech {
    position: absolute;
    bottom: 62%;
    left: 5%;
    background: white;
    border: 3px solid #2a1a4a;
    border-radius: 14px;
    padding: 7px 11px;
    font-size: 10.5px;
    font-weight: 700;
    color: #2a1a4a;
    line-height: 1.35;
    box-shadow: 2px 2px 0 rgba(42,26,74,0.4);
    z-index: 6;
    max-width: 50%;
    text-align: center;
    animation: bubbleFloat 3s ease-in-out infinite;
    font-family: 'M PLUS Rounded 1c', sans-serif;
    white-space: nowrap;
  }
  .cat-speech::after {
    content: ""; position: absolute;
    bottom: -10px; left: 28%;
    width: 0; height: 0;
    border: 7px solid transparent;
    border-top-color: #2a1a4a;
  }
  .cat-speech::before {
    content: ""; position: absolute;
    bottom: -6px; left: 28%;
    width: 0; height: 0;
    border: 5px solid transparent;
    border-top-color: white;
    z-index: 1;
  }
  @keyframes bubbleFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
  }

  /* Cat character (image) */
  .cat-wrapper {
    position: absolute;
    bottom: 8%;
    left: 12%;
    width: 160px;
    z-index: 4;
    cursor: pointer;
    animation: catIdleSway 6s ease-in-out infinite;
  }
  .cat-wrapper:active { transform: scale(0.96); }
  .cat-img {
    width: 100%;
    display: block;
    -webkit-mask-image: radial-gradient(ellipse 55% 60% at 50% 48%, black 50%, rgba(0,0,0,0.5) 72%, transparent 92%);
    mask-image: radial-gradient(ellipse 55% 60% at 50% 48%, black 50%, rgba(0,0,0,0.5) 72%, transparent 92%);
    animation: catBreathe 3s ease-in-out infinite;
    filter: drop-shadow(0 8px 18px rgba(0,0,0,0.5)) drop-shadow(0 0 30px rgba(0,229,255,0.4));
    transition: opacity 0.3s;
  }
  .cat-img.swapping { opacity: 0; }
  .cat-glow {
    position: absolute;
    bottom: 6px; left: 50%;
    transform: translateX(-50%);
    width: 140px; height: 24px;
    background: radial-gradient(ellipse, rgba(0,229,255,0.45), transparent 65%);
    border-radius: 50%;
    filter: blur(8px);
    animation: glowPulse 3s ease-in-out infinite;
    z-index: -1;
    pointer-events: none;
  }
  @keyframes catIdleSway {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    25% { transform: translateY(-2px) rotate(-1deg); }
    75% { transform: translateY(-1px) rotate(1deg); }
  }
  @keyframes catBreathe {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.02); }
  }
  @keyframes glowPulse {
    0%, 100% { opacity: 0.5; transform: translateX(-50%) scale(1); }
    50% { opacity: 0.85; transform: translateX(-50%) scale(1.15); }
  }

  /* Home action buttons */
  .home-actions {
    position: relative; z-index: 3;
    padding: 10px 14px 0;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }
  .home-action-btn {
    background: white;
    border: 3px solid #2a1a4a;
    border-radius: 12px;
    padding: 8px 4px;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    cursor: pointer;
    color: #2a1a4a;
    font-family: 'M PLUS Rounded 1c', sans-serif;
    font-weight: 700;
    box-shadow: 0 3px 0 rgba(42,26,74,0.5);
    transition: all 0.15s;
  }
  .home-action-btn:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 rgba(42,26,74,0.5);
  }
  .home-action-btn.talk  { background: #ffe5f1; border-color: #c93c82; color: #c93c82; box-shadow: 0 3px 0 rgba(201,60,130,0.7); }
  .home-action-btn.pet   { background: #e5f9ff; border-color: #0088b5; color: #0088b5; box-shadow: 0 3px 0 rgba(0,136,181,0.7); }
  .home-action-btn.treat { background: #fff5c4; border-color: #c9a030; color: #7a5f10; box-shadow: 0 3px 0 rgba(201,160,48,0.7); }
  .home-action-btn.today { background: #e5ffe9; border-color: #00b560; color: #006040; box-shadow: 0 3px 0 rgba(0,181,96,0.7); }
  .action-icon { font-size: 18px; line-height: 1; }
  .action-label { font-size: 10px; letter-spacing: 0.03em; }

  /* Chat overlay */
  .chat-overlay {
    position: absolute; inset: 0;
    background: rgba(5,10,26,0.94);
    backdrop-filter: blur(10px);
    z-index: 50;
    display: flex; flex-direction: column;
    padding-top: 54px;
    padding-bottom: 86px;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    pointer-events: none;
  }
  .chat-overlay.open {
    transform: translateY(0);
    pointer-events: auto;
  }
  .chat-header {
    padding: 14px 20px 10px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid rgba(0,229,255,0.2);
  }
  .chat-close {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(0,229,255,0.3);
    color: var(--ink);
    width: 32px; height: 32px;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    display: grid; place-items: center;
  }
  .chat-avatar-small {
    width: 40px; height: 40px;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid var(--cyan);
    box-shadow: 0 0 12px rgba(0,229,255,0.5);
    flex-shrink: 0;
    background: #0a1628;
  }
  .chat-avatar-small img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center 35%;
    transform: scale(1.15);
  }
  .chat-title {
    flex: 1;
    font-family: 'DotGothic16', monospace;
    font-size: 15px;
    letter-spacing: 0.08em;
  }
  .chat-title .status-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    margin-right: 6px;
  }
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 14px 18px;
    display: flex; flex-direction: column;
    gap: 12px;
    scrollbar-width: none;
  }
  .chat::-webkit-scrollbar { display: none; }

  /* Message rows with avatars */
  .msg-row {
    display: flex;
    gap: 8px;
    align-items: flex-start;
    max-width: 88%;
    animation: slideUp 0.5s ease backwards;
  }
  .msg-row-cat { align-self: flex-start; }
  .msg-row-teten { align-self: flex-start; }
  .msg-row-user { align-self: flex-end; flex-direction: row-reverse; max-width: 82%; }

  .msg-avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
    border: 2px solid;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    position: relative;
  }
  .msg-avatar.cat { border-color: var(--cyan); background: #0a2028; }
  .msg-avatar.teten { border-color: var(--teten); background: linear-gradient(135deg, #6a7a9e, #485878); }
  .msg-avatar.user {
    border-color: var(--magenta);
    background: linear-gradient(135deg, #ff4d9f, #c93c82);
    display: grid; place-items: center;
    font-size: 14px;
    color: white;
  }
  .msg-avatar img {
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .msg-avatar.cat img {
    object-position: center 28%;
    transform: scale(1.15);
  }
  .msg-avatar.teten img {
    position: absolute;
    width: 180%; height: 180%;
    top: -8%;
    left: -40%;
    object-fit: contain;
    object-position: center top;
  }

  .msg {
    max-width: calc(100% - 42px);
    padding: 11px 14px;
    border-radius: 18px;
    font-size: 12.5px;
    line-height: 1.65;
  }
  .msg-time {
    font-family: 'Orbitron', sans-serif;
    font-size: 8.5px;
    color: var(--ink-dim);
    margin: 4px 4px 0;
    letter-spacing: 0.1em;
    opacity: 0.8;
  }
  .msg-cat {
    align-self: flex-start;
    background: linear-gradient(135deg, rgba(0,229,255,0.14), rgba(0,136,181,0.25));
    border: 1px solid rgba(0,229,255,0.3);
    border-bottom-left-radius: 4px;
    color: var(--ink);
  }
  .msg-cat .tag {
    display: inline-block;
    font-family: 'DotGothic16', monospace;
    font-size: 9.5px;
    color: var(--cyan);
    margin-bottom: 4px;
    letter-spacing: 0.1em;
  }
  .msg-user {
    align-self: flex-end;
    background: linear-gradient(135deg, #ff4d9f, #c93c82);
    color: white;
    border-bottom-right-radius: 4px;
    box-shadow: 0 4px 20px rgba(255,77,159,0.3);
  }
  .msg-time-user { align-self: flex-end; }
  .quick-replies {
    display: flex; flex-wrap: wrap; gap: 6px;
    padding: 0 18px 10px;
  }
  .qr-btn {
    font-family: 'DotGothic16', monospace;
    font-size: 11px;
    padding: 6px 11px;
    background: rgba(0,229,255,0.08);
    border: 1px solid rgba(0,229,255,0.3);
    border-radius: 100px;
    color: var(--cyan-dim);
    cursor: pointer;
    transition: all 0.2s;
  }
  .qr-btn:active { background: rgba(0,229,255,0.2); }
  .chat-input-bar {
    margin: 0 18px 6px;
    padding: 8px 8px 8px 16px;
    background: rgba(10,22,40,0.85);
    border: 1px solid rgba(0,229,255,0.25);
    border-radius: 100px;
    display: flex; align-items: center; gap: 8px;
  }
  .chat-input-bar input {
    flex: 1;
    background: transparent;
    border: none; outline: none;
    color: var(--ink);
    font-size: 12.5px;
    font-family: inherit;
  }
  .chat-input-bar input::placeholder { color: var(--ink-dim); }
  .send-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--cyan), #0088b5);
    border: none;
    color: var(--bg-deep);
    font-size: 15px;
    display: grid; place-items: center;
    cursor: pointer;
    box-shadow: 0 0 14px rgba(0,229,255,0.5);
  }

  /* =============================================================
     GIFTS SCREEN
     ============================================================= */
  .screen-bg-img {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 0;
  }
  .screen-bg-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(5,10,26,0.4) 0%, rgba(5,10,26,0.1) 40%, rgba(5,10,26,0.85) 100%);
    z-index: 1;
    pointer-events: none;
  }

  .screen-content {
    position: relative;
    z-index: 2;
    flex: 1;
    display: flex; flex-direction: column;
    padding-top: 54px;
    padding-bottom: 86px;
    overflow: hidden;
  }

  .section-header {
    padding: 14px 20px 8px;
    display: flex; justify-content: space-between; align-items: flex-end;
  }
  .section-title {
    font-family: 'Zen Kurenaido', 'Noto Sans JP', serif;
    font-size: 22px;
    line-height: 1;
    color: var(--ink);
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
  }
  .section-title .accent { color: var(--magenta); text-shadow: 0 0 12px rgba(255,77,159,0.6); }
  .section-sub {
    font-family: 'DotGothic16', monospace;
    font-size: 10px;
    color: var(--cyan);
    margin-top: 3px;
    letter-spacing: 0.15em;
    text-shadow: 0 1px 4px rgba(0,0,0,0.6);
  }
  .live-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    padding: 4px 8px;
    background: rgba(255,77,159,0.2);
    border: 1px solid rgba(255,77,159,0.5);
    border-radius: 100px;
    color: var(--magenta);
    letter-spacing: 0.1em;
    backdrop-filter: blur(6px);
  }
  .live-badge::before {
    content: ""; width: 5px; height: 5px; border-radius: 50%;
    background: var(--magenta); box-shadow: 0 0 6px var(--magenta);
    animation: pulse 1.3s ease-in-out infinite;
  }

  .gifts-hero {
    margin: 6px 16px 10px;
    padding: 10px 12px;
    background: rgba(10,22,40,0.55);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(0,229,255,0.3);
    border-radius: 12px;
    display: flex; align-items: center; gap: 12px;
  }
  .gifts-hero-img {
    width: 60px; height: 60px;
    border-radius: 10px;
    overflow: hidden;
    flex-shrink: 0;
    border: 1px solid rgba(0,229,255,0.3);
  }
  .gifts-hero-img img { width: 100%; height: 100%; object-fit: cover; }
  .gifts-hero-text { flex: 1; min-width: 0; }
  .gifts-hero-title {
    font-size: 12.5px; font-weight: 700; color: var(--ink);
  }
  .gifts-hero-sub {
    font-family: 'DotGothic16', monospace;
    font-size: 10px;
    color: var(--cyan-dim);
    margin-top: 3px;
    letter-spacing: 0.05em;
  }

  .gifts-scroll { flex: 1; overflow-y: auto; padding: 4px 16px 14px; scrollbar-width: none; }
  .gifts-scroll::-webkit-scrollbar { display: none; }
  .gift-card {
    display: grid;
    grid-template-columns: 64px 1fr auto;
    gap: 12px;
    padding: 12px;
    background: rgba(10,22,40,0.75);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(0,229,255,0.25);
    border-radius: 14px;
    margin-bottom: 10px;
    position: relative;
    overflow: hidden;
    align-items: center;
  }
  .gift-card.hot::before {
    content: "HOT";
    position: absolute;
    top: 6px; left: -22px;
    transform: rotate(-40deg);
    background: var(--magenta);
    color: white;
    font-family: 'Orbitron', sans-serif;
    font-size: 8px; font-weight: 900;
    padding: 2px 24px;
    letter-spacing: 0.2em;
    z-index: 2;
  }
  .gift-icon {
    width: 64px; height: 64px;
    border-radius: 10px;
    background: linear-gradient(135deg, #1a2f4a, #0a1628);
    display: grid; place-items: center;
    font-size: 30px;
    border: 1px solid rgba(0,229,255,0.2);
  }
  .gift-info { min-width: 0; }
  .gift-name {
    font-size: 13px; font-weight: 700;
    color: var(--ink); margin-bottom: 2px;
    overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
  }
  .gift-from { font-size: 10px; color: var(--cyan-dim); margin-bottom: 4px; }
  .gift-meter {
    width: 100%; height: 4px;
    background: rgba(0,229,255,0.1);
    border-radius: 100px; overflow: hidden;
  }
  .gift-meter-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--cyan), var(--magenta));
    border-radius: 100px;
    box-shadow: 0 0 6px var(--cyan);
  }
  .gift-stock {
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    color: var(--ink-dim);
    margin-top: 3px;
    letter-spacing: 0.08em;
  }
  .gift-stock .num { color: var(--magenta); font-weight: 700; }
  .gift-action {
    padding: 8px 14px;
    background: linear-gradient(135deg, var(--cyan), #0088b5);
    border: none;
    border-radius: 100px;
    font-family: 'DotGothic16', monospace;
    font-size: 11px;
    color: var(--bg-deep);
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 0 12px rgba(0,229,255,0.4);
    letter-spacing: 0.05em;
  }
  .gift-action:disabled { background: #2a3a5a; color: var(--ink-dim); box-shadow: none; }

  /* =============================================================
     PEOPLE SCREEN
     ============================================================= */
  .street-scene {
    position: relative;
    flex: 1;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }
  .street-bg {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center;
  }
  .street-overlay {
    position: absolute; inset: 0;
    background:
      linear-gradient(180deg, rgba(26,13,58,0.6) 0%, transparent 30%, transparent 60%, rgba(5,10,26,0.5) 100%);
    pointer-events: none;
  }

  /* Walking cat - smooth continuous walk */
  .street-cat {
    position: absolute;
    bottom: 10%;
    width: 110px;
    z-index: 11;
    left: -25%;
    animation: streetCatWalk 30s cubic-bezier(0.37, 0, 0.63, 1) infinite;
    pointer-events: none;
    transform-origin: center bottom;
  }
  .street-cat img {
    width: 100%;
    display: block;
    filter: drop-shadow(0 6px 10px rgba(0,0,0,0.6)) drop-shadow(0 0 22px rgba(0,229,255,0.6));
    animation: catTrot 0.42s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate;
    transform-origin: center bottom;
  }
  .street-cat::after {
    /* dust trail */
    content: "";
    position: absolute;
    bottom: 4%; left: 10%;
    width: 80%; height: 6px;
    background: radial-gradient(ellipse, rgba(0,229,255,0.35), transparent 70%);
    filter: blur(3px);
    animation: trailFade 1.2s ease-in-out infinite;
  }
  @keyframes streetCatWalk {
    /* Walk left-to-right, pause, turn, walk back, turn, repeat */
    0%   { left: -25%; transform: scaleX(-1); }
    40%  { left: 62%; transform: scaleX(-1); }
    43%  { left: 62%; transform: scaleX(-1) scale(0.98); }
    46%  { left: 62%; transform: scaleX(1) scale(0.98); }
    49%  { left: 62%; transform: scaleX(1); }
    89%  { left: -25%; transform: scaleX(1); }
    92%  { left: -25%; transform: scaleX(1) scale(0.98); }
    95%  { left: -25%; transform: scaleX(-1) scale(0.98); }
    100% { left: -25%; transform: scaleX(-1); }
  }
  @keyframes catTrot {
    0% { transform: translateY(0) rotate(-1deg); }
    50% { transform: translateY(-2px) rotate(0deg); }
    100% { transform: translateY(0) rotate(1deg); }
  }
  @keyframes trailFade {
    0%, 100% { opacity: 0.2; transform: scaleX(0.8); }
    50% { opacity: 0.6; transform: scaleX(1.1); }
  }

  /* People layer */
  .people-layer {
    position: absolute;
    inset: 0;
    z-index: 10;
  }
  .person-fig {
    position: absolute;
    cursor: pointer;
    transition: all 0.25s;
    z-index: 10;
  }
  .person-fig:active { transform: translateX(-50%) scale(0.94); }
  .person-fig:hover .person-img-wrap { filter: brightness(1.15) drop-shadow(0 0 18px currentColor); }

  .person-img-wrap {
    position: relative;
    width: 100%;
    transition: filter 0.2s;
  }
  .person-img-wrap img {
    width: 100%;
    display: block;
    mix-blend-mode: multiply;
    filter: drop-shadow(0 6px 12px rgba(0,0,0,0.5));
    -webkit-mask-image: radial-gradient(ellipse 48% 58% at 50% 50%, black 70%, rgba(0,0,0,0.3) 88%, transparent 100%);
    mask-image: radial-gradient(ellipse 48% 58% at 50% 50%, black 70%, rgba(0,0,0,0.3) 88%, transparent 100%);
  }

  /* Maean directory link card */

  /* Person modal */
  .person-modal {

  /* =============================================================
     WALLET SCREEN
     ============================================================= */
  .wallet-top { padding: 14px 20px 4px; text-align: center; position: relative; z-index: 3; }
  .wallet-label {
    font-family: 'DotGothic16', monospace;
    font-size: 11px; color: var(--cyan);
    letter-spacing: 0.25em; margin-bottom: 4px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.7);
  }
  .wallet-title {
    font-family: 'Zen Kurenaido', serif;
    font-size: 26px; color: var(--ink); line-height: 1;
    text-shadow: 0 2px 8px rgba(0,0,0,0.7);
  }
  .wallet-title .accent { color: var(--yellow); text-shadow: 0 0 16px rgba(255,217,61,0.7); }

  .wallet-orb-wrap {
    position: relative;
    margin: 18px auto 10px;
    width: 240px; height: 240px;
    display: grid; place-items: center;
    z-index: 3;
  }
  .wallet-orb-img {
    width: 200px; height: 200px;
    border-radius: 50%;
    overflow: hidden;
    position: relative;
    box-shadow:
      0 0 80px rgba(255,217,61,0.6),
      0 0 40px rgba(255,138,92,0.4);
    animation: orbFloat 4s ease-in-out infinite;
  }
  .wallet-orb-img img {
    width: 100%; height: 100%;
    object-fit: cover;
    animation: spin 30s linear infinite;
  }
  @keyframes orbFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .wallet-ring { position: absolute; inset: 0; pointer-events: none; }
  .wallet-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: rgba(0,229,255,0.15); stroke-width: 6; }
  .ring-fill {
    fill: none;
    stroke: url(#gradRing);
    stroke-width: 6;
    stroke-linecap: round;
    filter: drop-shadow(0 0 10px rgba(0,229,255,0.8));
  }
  .coin-orbit {
    position: absolute; inset: 0;
    animation: spin 12s linear infinite;
    pointer-events: none;
  }
  .coin-orbit .coin {
    position: absolute;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fff6c2, #ffd93d 50%, #c9a030);
    box-shadow: 0 0 14px rgba(255,217,61,0.9);
    top: 0; left: 50%;
    transform: translateX(-50%);
  }
  .coin-orbit .coin::before {
    content: "¥";
    position: absolute; inset: 0;
    display: grid; place-items: center;
    font-family: 'Orbitron', sans-serif;
    font-size: 13px; font-weight: 900;
    color: #5a3f0a;
  }
  .coin-orbit:nth-child(1) { animation-duration: 10s; }
  .coin-orbit:nth-child(2) { animation-duration: 14s; animation-direction: reverse; transform: rotate(120deg); }
  .coin-orbit:nth-child(3) { animation-duration: 18s; transform: rotate(240deg); }
  .wallet-stats { text-align: center; padding: 0 20px; position: relative; z-index: 3; }
  .wallet-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 38px; font-weight: 900;
    color: var(--yellow);
    line-height: 1;
    text-shadow: 0 0 20px rgba(255,217,61,0.6), 0 2px 6px rgba(0,0,0,0.8);
  }
  .wallet-value .unit { font-size: 16px; margin-left: 4px; color: var(--ink-dim); text-shadow: none; }
  .wallet-progress {
    margin: 10px auto 6px;
    max-width: 260px;
    height: 8px;
    background: rgba(0,229,255,0.1);
    border-radius: 100px;
    border: 1px solid rgba(0,229,255,0.2);
    overflow: hidden;
    position: relative;
  }
  .wallet-progress-fill {
    height: 100%;
    width: 64%;
    background: linear-gradient(90deg, var(--cyan), var(--yellow), var(--magenta));
    background-size: 200% 100%;
    animation: shine 3s linear infinite;
    border-radius: 100px;
  }
  @keyframes shine {
    0% { background-position: 0% 0; }
    100% { background-position: 200% 0; }
  }
  .wallet-caption {
    font-size: 11px; color: var(--ink); margin-top: 2px;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  }
  .wallet-caption .hi { color: var(--yellow); font-weight: 700; }

  /* Next stage card with poster image */

    margin: 10px 16px 4px;

  .wallet-next-label {

    color: var(--magenta);

  }
  .wallet-next-title {
    font-size: 12.5px; color: var(--ink);

  }
  .wallet-next-sub { font-size: 10px; color: var(--ink-dim); margin-top: 1px; }

  /* =============================================================
     TETEN CHARACTER (image from official artwork)
     ============================================================= */
  .teten-img-wrap {
    position: relative;
    display: inline-block;
  }
  .teten-img-wrap img {
    display: block;
    filter: drop-shadow(0 6px 10px rgba(0,0,0,0.4)) drop-shadow(0 0 14px rgba(124,255,176,0.4));
  }
  @keyframes tetenBlink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }
  @keyframes tetenFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }
  @keyframes tetenBounce {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-14px) scale(1.08); }
  }
  @keyframes tetenWiggle {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    25% { transform: translateY(-4px) rotate(-6deg); }
    75% { transform: translateY(-4px) rotate(6deg); }
  }
  @keyframes tetenShake {
    0%, 100% { transform: translateX(0) translateY(0); }
    25% { transform: translateX(-5px) translateY(-2px); }
    75% { transform: translateX(5px) translateY(-2px); }
  }

  /* Teten in room (home screen) */
  .teten-home {
    position: absolute;
    bottom: 11%;
    right: 10%;
    width: 100px;
    z-index: 4;
    cursor: pointer;
    animation: tetenFloat 4.2s ease-in-out infinite;
    background: transparent;
    border: none;
    outline: none;
  }
  .teten-home:active { transform: scale(0.95); }
  .teten-home img {
    width: 100%;
    display: block;
  }
  /* Aura removed per user request */

    display: none;
  }

  /* Teten speech bubble */
  .teten-speech {
    position: absolute;
    bottom: 55%;
    right: 5%;
    background: white;
    border: 3px solid #2a4a1a;
    border-radius: 14px;
    padding: 7px 11px;
    font-size: 10.5px;
    font-weight: 700;
    color: #2a4a1a;
    line-height: 1.35;
    box-shadow: 2px 2px 0 rgba(42,74,26,0.4);
    z-index: 6;

    font-family: 'M PLUS Rounded 1c', sans-serif;

    content: ""; position: absolute;
