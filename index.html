    width: 0; height: 0;
    border: 7px solid transparent;
    border-top-color: #2a4a1a;
  }
  .teten-speech::before {
    content: ""; position: absolute;
    bottom: -6px; right: 28%;
    left: auto;
    width: 0; height: 0;
    border: 5px solid transparent;
    border-top-color: white;
    z-index: 1;
  }

  /* Teten small avatar (for chat) */
  .teten-sm {
    width: 40px; height: 40px;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid var(--teten);
    box-shadow: 0 0 12px rgba(124,255,176,0.5);
    flex-shrink: 0;
    background: linear-gradient(135deg, #6a7a9e, #485878);
    position: relative;
  }
  .teten-sm img {
    position: absolute;
    width: 180%; height: 180%;
    top: -8%;
    left: -40%;
    object-fit: contain;
    object-position: center top;
  }

  /* =============================================================
     ONBOARDING CHAT (first-launch experience)
     ============================================================= */
  .onboarding {
    position: absolute;
    inset: 0;
    z-index: 999;
    background: linear-gradient(180deg, #0a0614 0%, #1a0e2a 50%, #0a0614 100%);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .onboarding.dismissed {
    opacity: 0;
    transform: translateY(-20px);
    pointer-events: none;
  }
  .onb-bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(255,77,159,0.18), transparent 50%),
      radial-gradient(ellipse at 70% 80%, rgba(0,229,255,0.12), transparent 50%),
      radial-gradient(circle at 50% 50%, rgba(124,255,176,0.08), transparent 60%);
    pointer-events: none;
  }
  .onb-stars {
    position: absolute; inset: 0;
    pointer-events: none;
  }
  .onb-stars span {
    position: absolute;
    width: 2px; height: 2px;
    background: var(--ink);
    border-radius: 50%;
    box-shadow: 0 0 6px var(--ink);
    animation: onbTwinkle 2s ease-in-out infinite;
  }
  .onb-stars span:nth-child(1) { top: 10%; left: 15%; animation-delay: 0s; }
  .onb-stars span:nth-child(2) { top: 22%; left: 80%; animation-delay: 0.4s; background: var(--cyan); box-shadow: 0 0 6px var(--cyan); }
  .onb-stars span:nth-child(3) { top: 35%; left: 8%; animation-delay: 0.8s; background: var(--magenta); box-shadow: 0 0 6px var(--magenta); }
  .onb-stars span:nth-child(4) { top: 55%; left: 92%; animation-delay: 1.2s; background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }
  .onb-stars span:nth-child(5) { top: 68%; left: 20%; animation-delay: 1.6s; background: var(--cyan); box-shadow: 0 0 6px var(--cyan); }
  .onb-stars span:nth-child(6) { top: 78%; left: 70%; animation-delay: 0.2s; background: var(--magenta); box-shadow: 0 0 6px var(--magenta); }
  .onb-stars span:nth-child(7) { top: 88%; left: 30%; animation-delay: 0.6s; }
  .onb-stars span:nth-child(8) { top: 92%; left: 85%; animation-delay: 1.0s; background: var(--green); box-shadow: 0 0 6px var(--green); }
  @keyframes onbTwinkle {
    0%, 100% { opacity: 0.2; transform: scale(0.6); }
    50% { opacity: 1; transform: scale(1.5); }
  }

  .onb-content {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 50px 18px 18px;
    overflow: hidden;
  }

  .onb-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .onb-logo-mini {
    font-family: 'M PLUS Rounded 1c', sans-serif;
    font-size: 14px;
    font-weight: 900;
    letter-spacing: 0.05em;
  }
  .onb-logo-mini .onb-logo-a { color: var(--magenta); }
  .onb-logo-mini .onb-logo-b { color: var(--cyan); }

  .onb-step-pips {
    display: flex;
    gap: 5px;
  }
  .onb-pip {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(255,238,205,0.25);
    transition: all 0.3s;
  }
  .onb-pip.active {
    width: 18px;
    border-radius: 100px;
    background: var(--magenta);
    box-shadow: 0 0 6px var(--magenta);
  }
  .onb-pip.done {
    background: var(--cyan);
  }

  .onb-chat {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 8px 0;
    scrollbar-width: none;
  }
  .onb-chat::-webkit-scrollbar { display: none; }

  .onb-msg-row {
    display: flex;
    gap: 8px;
    align-items: flex-start;
    max-width: 90%;
    animation: onbSlideUp 0.5s ease backwards;
  }
  .onb-msg-row.cat { align-self: flex-start; }
  .onb-msg-row.teten { align-self: flex-start; }
  .onb-msg-row.user { align-self: flex-end; flex-direction: row-reverse; max-width: 85%; }

  .onb-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
    border: 2px solid;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    position: relative;
  }
  .onb-avatar.cat { border-color: var(--cyan); background: #0a2028; }
  .onb-avatar.teten { border-color: var(--teten); background: linear-gradient(135deg, #6a7a9e, #485878); }
  .onb-avatar.user {
    border-color: var(--magenta);
    background: linear-gradient(135deg, var(--magenta), #c93c82);
    display: grid; place-items: center;
    font-size: 14px;
    color: white;
  }
  .onb-avatar img {
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .onb-avatar.cat img {
    object-position: center 28%;
    transform: scale(1.15);
  }
  .onb-avatar.teten img {
    position: absolute;
    width: 180%; height: 180%;
    top: -8%;
    left: -40%;
    object-fit: contain;
    object-position: center top;
  }

  .onb-bubble {
    padding: 11px 14px;
    border-radius: 16px;
    font-size: 12.5px;
    line-height: 1.7;
    font-family: 'M PLUS Rounded 1c', sans-serif;
    max-width: calc(100% - 42px);
    word-break: break-word;
  }
  .onb-bubble.cat {
    background: rgba(0,229,255,0.12);
    border: 1px solid rgba(0,229,255,0.4);
    color: var(--ink);
    border-bottom-left-radius: 4px;
  }
  .onb-bubble.teten {
    background: rgba(124,255,176,0.10);
    border: 1px solid rgba(124,255,176,0.4);
    color: var(--ink);
    border-bottom-left-radius: 4px;
  }
  .onb-bubble.user {
    background: linear-gradient(135deg, var(--magenta), #c93c82);
    color: white;
    border-bottom-right-radius: 4px;
    font-weight: 700;
  }
  .onb-bubble .tag {
    display: block;
    font-family: 'DotGothic16', monospace;
    font-size: 8.5px;
    letter-spacing: 0.15em;
    opacity: 0.7;
    margin-bottom: 4px;
  }
  .onb-bubble.cat .tag { color: var(--cyan); }
  .onb-bubble.teten .tag { color: var(--teten); }

  /* Typing indicator */
  .onb-typing {
    display: inline-flex;
    gap: 3px;
    padding: 4px 0;
  }
  .onb-typing span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.6;
    animation: onbDot 1.2s ease infinite;
  }
  .onb-typing span:nth-child(2) { animation-delay: 0.2s; }
  .onb-typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes onbDot {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  /* Choice buttons */
  .onb-choices {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 12px 0 8px;
    min-height: 50px;
    align-content: flex-start;
    animation: onbSlideUp 0.5s ease backwards;
  }
  .onb-choice {
    background: rgba(255,255,255,0.05);
    border: 1.5px solid rgba(255,238,205,0.3);
    color: var(--ink);
    padding: 9px 14px;
    border-radius: 100px;
    font-family: 'M PLUS Rounded 1c', sans-serif;
    font-size: 12.5px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    backdrop-filter: blur(6px);
  }
  .onb-choice:hover {
    background: rgba(255,77,159,0.2);
    border-color: var(--magenta);
    color: white;
    transform: translateY(-2px);
  }
  .onb-choice.selected {
    background: linear-gradient(135deg, var(--magenta), #c93c82);
    color: white;
    border-color: var(--magenta);
    box-shadow: 0 4px 14px rgba(255,77,159,0.45);
  }
  .onb-choice.cta-go {
    background: linear-gradient(135deg, var(--magenta), var(--cyan));
    border: none;
    color: white;
    font-weight: 900;
    padding: 12px 22px;
    box-shadow: 0 4px 20px rgba(255,77,159,0.4);
    animation: onbCtaPulse 2s ease infinite;
    width: 100%;
    text-align: center;
  }
  @keyframes onbCtaPulse {
    0%, 100% { box-shadow: 0 4px 20px rgba(255,77,159,0.4); }
    50% { box-shadow: 0 6px 30px rgba(255,77,159,0.7); }
  }

  /* Free text input mode */
  .onb-input-row {
    display: flex;
    gap: 8px;
    width: 100%;
  }
  .onb-input {
    flex: 1;
    padding: 10px 14px;
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,238,205,0.3);
    border-radius: 100px;
    color: var(--ink);
    font-family: 'M PLUS Rounded 1c', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .onb-input:focus {
    border-color: var(--magenta);
    background: rgba(255,77,159,0.05);
  }
  .onb-input::placeholder {
    color: var(--ink-dim);
    opacity: 0.6;
  }
  .onb-input-send {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--magenta);
    color: white;
    border: none;
    cursor: pointer;
    display: grid;
    place-items: center;
    font-size: 16px;
    transition: all 0.2s;
  }
  .onb-input-send:hover {
    background: var(--cyan);
    transform: scale(1.05);
  }

  .onb-skip {
    background: transparent;
    border: none;
    color: var(--ink-dim);
    font-size: 11px;
    font-family: 'DotGothic16', monospace;
    letter-spacing: 0.1em;
    cursor: pointer;
    padding: 8px;
    text-align: center;
    margin-top: 4px;
    opacity: 0.6;
    transition: opacity 0.2s;
  }
  .onb-skip:hover { opacity: 1; }

  @keyframes onbSlideUp {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* =============================================================
     PAW STAMP SYSTEM
     ============================================================= */
  .paws-badge {
    display: flex;
    align-items: center;
    gap: 4px;
    background: rgba(255,255,255,0.94);
    border: 2px solid #2a1a4a;
    border-radius: 10px;
    padding: 3px 7px;
    box-shadow: 0 2px 0 rgba(42,26,74,0.6);
    white-space: nowrap;
  }
  .paws-badge-icon {
    font-size: 11px;
  }
  .paws-badge-count {
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    font-weight: 900;
    color: #2a1a4a;
    line-height: 1;
  }

  /* Paw collection modal */
  .paw-stamp-fly {
    position: absolute;
    top: 45%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-size: 60px;
    z-index: 100;
    pointer-events: none;
    opacity: 0;
  }
  .paw-stamp-fly.anim {
    animation: pawFly 1.5s ease-out forwards;
  }
  @keyframes pawFly {
    0% { transform: translate(-50%, -50%) scale(0) rotate(-30deg); opacity: 0; }
    20% { transform: translate(-50%, -50%) scale(1.4) rotate(10deg); opacity: 1; }
    60% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
    100% {
      transform: translate(200%, -800%) scale(0.3) rotate(40deg);
      opacity: 0;
    }
  }

  /* Paw collection grid (viewable in wallet or modal) */
  .paw-collection {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
    margin: 10px 0;
  }
  .paw-slot {
    aspect-ratio: 1;
    border-radius: 8px;
    border: 1.5px dashed rgba(0,229,255,0.3);
    background: rgba(0,229,255,0.03);
    display: grid; place-items: center;
    font-size: 16px;
    color: var(--ink-dim);
    opacity: 0.4;
  }
  .paw-slot.filled {
    background: linear-gradient(135deg, rgba(255,77,159,0.15), rgba(0,229,255,0.15));
    border: 1.5px solid var(--magenta);
    opacity: 1;
    color: var(--magenta);
    box-shadow: 0 0 8px rgba(255,77,159,0.3);
  }

  /* People-screen paw badge (header) */
  .people-paw-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    background: rgba(10,22,40,0.8);
    border: 1.5px solid var(--magenta);
    border-radius: 12px;
    backdrop-filter: blur(8px);
    box-shadow: 0 0 16px rgba(255,77,159,0.3);
    flex-shrink: 0;
  }
  .people-paw-icon {
    font-size: 20px;
    filter: drop-shadow(0 0 6px rgba(255,77,159,0.6));
  }
  .people-paw-text {
    font-family: 'Orbitron', sans-serif;
    line-height: 1;
  }
  .people-paw-count {
    font-size: 13px;
    font-weight: 900;
    color: var(--magenta);
  }
  .people-paw-count span { color: var(--ink); }
  .people-paw-label {
    font-family: 'DotGothic16', monospace;
    font-size: 7.5px;
    color: var(--ink-dim);
    letter-spacing: 0.1em;
    margin-top: 3px;
  }

  /* Paw Panel at bottom of people screen */
  .paw-panel {
    position: absolute;
    bottom: 86px;
    left: 0; right: 0;
    z-index: 40;
    background: linear-gradient(180deg, rgba(10,22,40,0.85), rgba(5,10,26,0.95));
    backdrop-filter: blur(14px);
    border-top: 2px solid rgba(255,77,159,0.5);
    padding: 8px 16px 10px;
    box-shadow: 0 -6px 20px rgba(0,0,0,0.4);
  }
  .paw-panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 5px;
  }
  .paw-panel-title {
    display: flex; align-items: center; gap: 6px;
    font-family: 'DotGothic16', monospace;
    font-size: 9.5px;
    color: var(--magenta);
    letter-spacing: 0.15em;
  }
  .paw-panel-count {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    color: var(--magenta);
    font-weight: 900;
  }
  .paw-panel-count span { color: var(--ink); }
  .paw-panel .paw-collection {
    margin: 0;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    max-width: 140px;
  }
  .paw-panel .paw-slot {
    aspect-ratio: 1;
    font-size: 12px;
    border-radius: 5px;
  }

  /* =============================================================
     HITO ZUKAN (People Encyclopedia - Book UI)
     ============================================================= */
  .zukan-bg {
    position: absolute; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(255,180,100,0.18), transparent 60%),
      linear-gradient(180deg, #2a1810 0%, #1a0e08 50%, #0a0604 100%);
  }
  .zukan-bg::before {
    content: "";
    position: absolute; inset: 0;
    background:
      repeating-linear-gradient(90deg,
        transparent 0px, transparent 40px,
        rgba(0,0,0,0.2) 40px, rgba(0,0,0,0.2) 41px,
        transparent 41px, transparent 80px);
  }
  .zukan-bg::after {
    content: "";
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.6) 100%);
  }

  .zukan-book {
    position: relative;
    margin: 0 16px;
    aspect-ratio: 3 / 4;
    max-height: 420px;
    background: linear-gradient(135deg, #6a3f20 0%, #3a2010 100%);
    border-radius: 8px 4px 4px 8px;
    padding: 10px 12px 10px 16px;
    box-shadow:
      0 10px 30px rgba(0,0,0,0.6),
      inset 0 0 20px rgba(255,200,150,0.15);
    overflow: hidden;
  }
  .zukan-book-spine {
    position: absolute;
    top: 0; bottom: 0; left: 0;
    width: 8px;
    background: linear-gradient(90deg, rgba(0,0,0,0.6) 0%, transparent 100%);
    pointer-events: none;
    z-index: 3;
  }
  .zukan-book-spine-right {
    left: auto; right: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(0,0,0,0.4) 100%);
  }
  .zukan-pages {
    position: relative;
    width: 100%;
    height: 100%;
    background: linear-gradient(180deg, #faf3e0 0%, #f0e4c8 100%);
    border-radius: 3px;
    overflow: hidden;
    box-shadow:
      inset 0 0 20px rgba(180,140,80,0.15),
      inset 0 2px 0 rgba(255,255,255,0.5);
  }
  .zukan-pages::before {
    content: "";
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(180,140,80,0.08) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(140,100,60,0.06) 0%, transparent 50%);
    pointer-events: none;
  }
  .zukan-page {
    position: absolute;
    inset: 0;
    padding: 14px 14px 10px;
    display: none;
    flex-direction: column;
    font-family: 'M PLUS Rounded 1c', sans-serif;
    color: #2a1810;
  }
  .zukan-page.active { display: flex; animation: pageFlip 0.5s ease; }
  @keyframes pageFlip {
    0% { opacity: 0; transform: translateX(20px) rotateY(30deg); transform-origin: left; }
    100% { opacity: 1; transform: translateX(0) rotateY(0); }
  }
  .zukan-page-number {
    position: absolute;
    top: 6px; right: 10px;
    font-family: 'DotGothic16', monospace;
    font-size: 9px;
    color: #8b5a3c;
    letter-spacing: 0.1em;
  }
  .zukan-page-header {
    display: flex;
    align-items: baseline;
    gap: 6px;
    padding-bottom: 5px;
    border-bottom: 2px solid #2a1810;
    margin-bottom: 10px;
  }
  .zukan-page-category {
    font-family: 'DotGothic16', monospace;
    font-size: 9px;
    color: #ff6b4a;
    letter-spacing: 0.15em;
    background: rgba(255,107,74,0.1);
    padding: 2px 6px;
    border-radius: 3px;
  }
  .zukan-page-epnum {
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    font-weight: 900;
    color: #5a3a20;
    margin-left: auto;
  }
  .zukan-page-portrait {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    margin-bottom: 10px;
  }
  .zukan-page-img {
    width: 82px; height: 100px;
    background: linear-gradient(135deg, #d4b891, #a88560);
    border: 2px solid #2a1810;
    border-radius: 3px;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
    box-shadow: 2px 3px 6px rgba(0,0,0,0.3);
  }
  .zukan-page-img::after {
    content: "";
    position: absolute;
    top: -5px; left: 50%;
    transform: translateX(-50%) rotate(-2deg);
    width: 40px; height: 12px;
    background: rgba(255,230,160,0.6);
    border: 1px solid rgba(180,140,80,0.4);
    z-index: 3;
  }
  .zukan-page-img img {
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .zukan-page-img.mystery {
    background: linear-gradient(135deg, #3a2652, #1a1030);
    display: grid; place-items: center;
    color: rgba(255,255,255,0.7);
    font-size: 44px;
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    text-shadow: 0 0 10px rgba(200,150,255,0.8);
  }
  /* Themed icon card (per-guest styled polaroid) */
  .zukan-page-img.themed {
    border-width: 3px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 8px 4px;
  }
  .zukan-page-img.themed::before {
    /* Subtle radial shine */
    content: "";
    position: absolute;
    top: -30%; left: -30%;
    width: 60%; height: 60%;
    background: radial-gradient(circle, rgba(255,255,255,0.3), transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }
  .zukan-icon-circle {
    width: 54px; height: 54px;
    border-radius: 50%;
    background: rgba(255,255,255,0.65);
    backdrop-filter: blur(4px);
    border: 2px solid;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 6px;
    box-shadow:
      inset 0 2px 4px rgba(255,255,255,0.5),
      0 2px 4px rgba(0,0,0,0.2);
    animation: iconPulse 3s ease-in-out infinite;
  }
  @keyframes iconPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }
  .zukan-icon-emoji {
    font-size: 30px;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3));
  }
  .zukan-icon-epnum {
    font-family: 'Orbitron', sans-serif;
    font-size: 8.5px;
    font-weight: 900;
    color: white;
    padding: 2px 7px;
    border-radius: 3px;
    letter-spacing: 0.1em;
    margin-top: 10px;
    margin-bottom: 2px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.3);
    text-shadow: 0 1px 1px rgba(0,0,0,0.3);
  }
  .zukan-page-info {
    flex: 1; min-width: 0;
  }
  .zukan-page-name {
    font-family: 'Zen Kurenaido', serif;
    font-size: 20px;
    font-weight: 700;
    color: #1a0e08;
    line-height: 1.15;
    margin-bottom: 2px;
  }
  .zukan-page-yomi {
    font-size: 9.5px;
    color: #8b5a3c;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }
  .zukan-page-role {
    font-size: 10.5px;
    color: #5a3a20;
    font-weight: 700;
    line-height: 1.4;
    padding: 4px 7px;
    background: rgba(180,140,80,0.15);
    border-left: 3px solid #ff6b4a;

  /* =============================================================
     BOOKSHELF (Poems tab)
     ============================================================= */
  .bookshelf-bg {
    position: absolute; inset: 0; z-index: 0;
    background:
      /* lighting gradient */
      radial-gradient(ellipse at 50% 0%, rgba(255,200,100,0.2), transparent 50%),
      /* wood wall */
      linear-gradient(180deg, #3a2612 0%, #2a1a0a 50%, #1a1008 100%);
  }
  .bookshelf-bg::before {
    /* wood grain overlay */
    content: "";
    position: absolute; inset: 0;
    background:
      repeating-linear-gradient(90deg,
        transparent 0px,
        transparent 40px,
        rgba(0,0,0,0.15) 40px,
        rgba(0,0,0,0.15) 41px,
        transparent 41px,
        transparent 80px,
        rgba(255,180,100,0.05) 80px,
        rgba(255,180,100,0.05) 82px);
    mix-blend-mode: overlay;
  }
  .bookshelf-bg::after {
    /* subtle vignette */
    content: "";
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.5) 100%);
  }

  .bookshelf-wrap {
    position: relative;
    z-index: 2;
    margin: 4px 14px 0;
    padding: 10px 0 0;
  }
  .shelf {
    position: relative;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 3px;
    padding: 12px 10px 0;
    min-height: 170px;
    margin-bottom: 20px;
  }
  .shelf-plank {
    position: absolute;
    bottom: 0; left: -8px; right: -8px;
    height: 14px;
    background: linear-gradient(180deg, #6a3f20 0%, #8b5a3c 20%, #5a3018 80%, #3a2010 100%);
    border-radius: 2px;
    box-shadow:
      0 4px 8px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,200,150,0.3),
      inset 0 -2px 0 rgba(0,0,0,0.3);
  }
  .shelf-plank::before {
    content: "";
    position: absolute;
    top: 2px; left: 0; right: 0; bottom: 2px;
    background: repeating-linear-gradient(90deg,
      transparent 0,
      transparent 20px,
      rgba(0,0,0,0.2) 20px,
      rgba(0,0,0,0.2) 21px);
  }

  /* Individual books */
  .book {
    position: relative;
    width: 38px;
    cursor: pointer;
    transition: transform 0.3s cubic-bezier(0.34, 1.3, 0.64, 1);
    transform-origin: bottom center;
  }
  .book:hover {
    transform: translateY(-8px) scale(1.05);
    filter: brightness(1.15);
  }
  .book:active { transform: translateY(-3px) scale(1.0); }
  .book-spine {
    width: 100%;
    height: 100%;
    border-radius: 3px 3px 2px 2px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    gap: 6px;
    padding: 12px 2px 10px;
    box-shadow:
      inset -3px 0 4px rgba(0,0,0,0.3),
      inset 2px 0 2px rgba(255,255,255,0.15),
      3px 4px 8px rgba(0,0,0,0.5);
    overflow: hidden;
  }
  .book-spine::before {
    /* golden band / embossing - top and bottom */
    content: "";
    position: absolute;
    top: 8px; left: 3px; right: 3px;
    height: 1.5px;
    background: linear-gradient(90deg, transparent, #d4a14e, transparent);
  }
  .book-spine > .book-author::after {
    content: "";
    position: absolute;
    bottom: 8px; left: 3px; right: 3px;
    height: 1.5px;
    background: linear-gradient(90deg, transparent, #d4a14e, transparent);
    display: block;
  }
  .book-spine::after {
    /* subtle shine */
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 30%; height: 100%;
    background: linear-gradient(90deg, rgba(255,255,255,0.15), transparent);
    pointer-events: none;
  }
  .book-title-v {
    font-family: 'Zen Kurenaido', 'Noto Serif JP', serif;
    font-size: 13px;
    font-weight: 700;
    line-height: 1.15;
    color: #f8eecd;
    text-shadow: 0 1px 1px rgba(0,0,0,0.4);
    writing-mode: vertical-rl;
    text-orientation: upright;
    letter-spacing: 0.05em;
    white-space: nowrap;
    max-height: calc(100% - 30px);
    overflow: hidden;
    flex-shrink: 1;
  }
  .book-author {
    font-family: 'DotGothic16', monospace;
    font-size: 6.5px;
    color: rgba(255,238,205,0.75);
    letter-spacing: 0.05em;
    writing-mode: vertical-rl;
    text-orientation: upright;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* Color schemes for each book */
  .book-aoneko { height: 155px; }
  .book-aoneko .book-spine {

  }
  .book-aoneko .book-title-v {

  .book-kiba { height: 140px; }

  .book-take .book-title-v { color: #c5ffe2; text-shadow: 0 1px 1px rgba(0,0,0,0.8); }

  .book-neko-machi { height: 160px; }
  .book-neko-machi .book-spine {

  }
  .book-neko-machi .book-title-v {

  /* Decorative / empty books */
  .book-deco { cursor: default; }
  .book-deco:hover { transform: none; filter: none; }
  .book-empty .book-spine {
    background: linear-gradient(180deg, #2a241a 0%, #1a1510 100%);

  }

  /* Decorative lamp */
  .shelf-deco-lamp {
    position: relative;
    width: 30px;
    height: 80px;
    margin-left: 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .lamp-shade {
    width: 28px;

  /* Decorative plant */

  /* =============================================================
     TODAY EVENTS MODAL
     ============================================================= */
  .today-modal {
    position: absolute; inset: 0;
    background: rgba(5,10,26,0.92);
    backdrop-filter: blur(8px);
    z-index: 55;
    display: flex; align-items: flex-end;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .today-modal.open { opacity: 1; pointer-events: auto; }
  .today-card {
    position: relative;
    width: 100%;
    background: linear-gradient(180deg, rgba(13,27,58,0.98), rgba(10,22,40,0.98));
    border-top: 2px solid var(--green);
    border-radius: 24px 24px 36px 36px;
    padding: 20px 20px 95px;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.34, 1.3, 0.64, 1);
    box-shadow: 0 -10px 40px rgba(0,255,136,0.2);
    max-height: 88%;
    overflow-y: auto;
    scrollbar-width: none;
  }
  .today-card::-webkit-scrollbar { display: none; }
  .today-modal.open .today-card { transform: translateY(0); }

  /* ========== BULLETIN BOARD (Today Modal) ========== */
  .bulletin-card {
    background: linear-gradient(180deg, #2a1810 0%, #1a0e08 100%);
    border-top: 2px solid #8b5a3c;
    box-shadow: 0 -10px 40px rgba(255,138,92,0.15);
  }
  .bulletin-header {
    text-align: center;
    margin-bottom: 18px;
    padding-top: 4px;
  }
  .bulletin-title {
    font-family: 'Zen Kurenaido', serif;
    font-size: 24px;
    color: #f8eecd;
    text-shadow: 0 2px 4px rgba(0,0,0,0.6);
    line-height: 1.2;
  }
  .bulletin-title .accent {
    font-weight: 900;
  }
  .bulletin-date {
    font-family: 'DotGothic16', monospace;
    font-size: 10px;
    color: #c9a576;
    letter-spacing: 0.1em;
    margin-top: 4px;
  }

  /* Wooden board */
  .bulletin-board {
    position: relative;
    background:
      /* wood grain */
      repeating-linear-gradient(90deg,
        rgba(0,0,0,0.12) 0px, rgba(0,0,0,0.12) 2px,
        transparent 2px, transparent 60px,
        rgba(255,180,100,0.06) 60px, rgba(255,180,100,0.06) 62px),
      linear-gradient(180deg, #6a3f20 0%, #5a3318 50%, #4a2812 100%);
    border: 6px solid;
    border-image: linear-gradient(135deg, #8b5a3c, #3a2010 50%, #8b5a3c) 1;
    padding: 28px 16px 20px;
    border-radius: 4px;
    box-shadow:
      inset 0 2px 4px rgba(255,200,150,0.15),
      inset 0 -4px 8px rgba(0,0,0,0.4),
      0 6px 20px rgba(0,0,0,0.6);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px 10px;
    min-height: 420px;
  }
  .bulletin-board::before {
    /* Decorative "BULLETIN" sign at top */
    content: "📌 BULLETIN BOARD 📌";
    position: absolute;
    top: -14px; left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(180deg, #e8c89a, #c9a576);
    color: #3a2010;
    font-family: 'DotGothic16', monospace;
    font-size: 10px;
    font-weight: 900;
    padding: 4px 14px;
    border-radius: 4px;
    letter-spacing: 0.15em;
    box-shadow: 0 3px 6px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.3);
    border: 1px solid #3a2010;
    white-space: nowrap;
  }

  /* Individual flyer */
  .flyer {
    position: relative;
    background: #faf3e0;
    padding: 14px 10px 10px;
    font-family: 'M PLUS Rounded 1c', sans-serif;
    color: #2a1810;
    box-shadow:
      3px 4px 8px rgba(0,0,0,0.4),
      inset 0 0 30px rgba(180,140,80,0.08);
    font-size: 10.5px;
    line-height: 1.4;
    border-radius: 2px;
  }
  /* Tilt each flyer slightly for realism */
  .flyer-1 { transform: rotate(-2deg); background: #faf3e0; }
  .flyer-2 { transform: rotate(1.5deg); background: #f5e8cc; }
  .flyer-3 { transform: rotate(-1deg); background: #ffeaa7; }
  .flyer-4 { transform: rotate(2deg); background: #ffe4c4; }
  .flyer-5 { transform: rotate(-1.5deg); background: #ffd6d6; }
  .flyer-6 { transform: rotate(1deg); background: #d4f0c8; }

  .flyer:hover {
    transform: translateY(-2px) rotate(0deg);
    z-index: 5;
    box-shadow: 4px 6px 14px rgba(0,0,0,0.5);
  }

  .flyer-label {
    display: inline-block;
    font-family: 'Orbitron', sans-serif;

    padding: 2px 6px;
    border-radius: 100px;
    letter-spacing: 0.15em;
    margin-bottom: 4px;
  }
  .flyer-5 .flyer-label,
  .flyer-6 .flyer-label { background: #e94560; }
  .flyer-title {
    font-family: 'Zen Kurenaido', serif;
    font-size: 12px;
    font-weight: 700;
    line-height: 1.25;
    margin-bottom: 5px;

  .flyer-meta {
    font-size: 9px;
    color: #5a3a20;
    line-height: 1.4;
    margin-bottom: 6px;
    border-top: 1px dashed rgba(90,58,32,0.3);
    padding-top: 4px;
  }
  .flyer-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
  }
  .flyer-tag {
    font-family: 'DotGothic16', monospace;
    font-size: 8px;
    background: rgba(42,26,16,0.08);
    color: #5a3a20;
    padding: 1px 5px;
    border-radius: 3px;
    letter-spacing: 0.05em;
  }
  .flyer-tag.live {
    background: #e94560;
    color: white;
    font-weight: 900;
  }

  /* Thumbtack pins */
  .pin {
    position: absolute;
    top: -4px; left: 50%;
    transform: translateX(-50%);
    width: 14px; height: 14px;
    border-radius: 50%;
    box-shadow:
      0 2px 3px rgba(0,0,0,0.5),

  .pin::after {
    content: "";

    top: 4px; left: 50%;

  .pin-red { background: radial-gradient(circle at 30% 30%, #ff6b6b, #c0392b); }
  .pin-blue { background: radial-gradient(circle at 30% 30%, #74b9ff, #0984e3); }
  .pin-yellow { background: radial-gradient(circle at 30% 30%, #ffeaa7, #fdcb6e); }
  .pin-green { background: radial-gradient(circle at 30% 30%, #55efc4, #00b894); }

  .bulletin-footer {

  .today-title {

  .today-title .accent { color: var(--green); }
  .today-date {

  .event-section-header {

  .event-card {

  /* =============================================================
     POEM CARD (Sakutaro intro)
     ============================================================= */
  .poem-card {
    background: linear-gradient(180deg, rgba(255,217,61,0.12), rgba(255,217,61,0.04));

  .poem-body {

  /* =============================================================
     HOURGLASS (Wallet)
     ============================================================= */
  /* Centered hourglass inside orb ring */
  .wallet-center {
    position: relative;
    width: 170px; height: 170px;
    display: grid;
    place-items: center;
    z-index: 5;
  }
  .wallet-center-glow {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 50%,
      rgba(255,217,61,0.6) 0%,
      rgba(255,138,92,0.3) 30%,
      rgba(255,77,159,0.2) 60%,
      transparent 80%);
    filter: blur(10px);
    animation: orbPulse 4s ease-in-out infinite;
    border-radius: 50%;
  }
  .wallet-hourglass-img {
    width: 140px; height: auto;
    position: relative;
    z-index: 2;
    filter: drop-shadow(0 8px 20px rgba(255,217,61,0.6)) drop-shadow(0 0 30px rgba(255,138,92,0.5));
    animation: hourglassFloat 5s ease-in-out infinite;
  }
  @keyframes orbPulse {
    0%, 100% { opacity: 0.8; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.1); }
  }
  @keyframes hourglassFloat {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-4px) rotate(0.5deg); }
  }

  /* Dramatic locked next stage */
  .next-stage-locked {
    margin: 14px 16px 4px;
    padding: 14px;
    background:
      linear-gradient(135deg, rgba(255,77,159,0.12), rgba(0,229,255,0.1) 50%, rgba(255,217,61,0.08)),
      rgba(5,10,26,0.7);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(255,77,159,0.45);
    border-radius: 14px;
    display: grid;
    grid-template-columns: 72px 1fr;
    gap: 12px;
    align-items: center;
    position: relative;
    z-index: 3;
    overflow: hidden;
  }
  /* sweeping shine */
  .next-stage-locked::before {
    content: "";
    position: absolute;
    top: 0; left: -100%;
    width: 50%; height: 100%;
    background: linear-gradient(100deg,
      transparent 0%,
      rgba(255,255,255,0.08) 40%,
      rgba(0,229,255,0.2) 50%,
      rgba(255,255,255,0.08) 60%,
      transparent 100%);
    animation: nextShine 3.5s linear infinite;
    pointer-events: none;
  }
  @keyframes nextShine {
    0% { left: -100%; }
    100% { left: 200%; }
  }

  .next-stage-poster {
    position: relative;
    width: 72px; height: 92px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 0 20px rgba(255,77,159,0.4);
  }
  .next-stage-poster img {
    width: 100%; height: 100%;
    object-fit: cover;
    filter: grayscale(0.2) brightness(0.7);
  }
  .next-stage-lock {
    position: absolute;
    inset: 0;
    background: rgba(5,10,26,0.5);
    display: grid;
    place-items: center;
    backdrop-filter: blur(1px);
  }
  .next-stage-lock svg {
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.6));
    animation: lockShake 4s ease-in-out infinite;
  }
  @keyframes lockShake {
    0%, 92%, 100% { transform: rotate(0deg); }
    94% { transform: rotate(-8deg); }
    96% { transform: rotate(8deg); }
    98% { transform: rotate(-4deg); }
  }

  .next-stage-info {
    min-width: 0;
  }
  .next-stage-badge {
    display: inline-block;
    font-family: 'Orbitron', sans-serif;
    font-size: 8.5px;
    font-weight: 700;
    color: var(--magenta);
    background: rgba(255,77,159,0.15);
    border: 1px solid rgba(255,77,159,0.4);
    padding: 2px 7px;
    border-radius: 100px;
    letter-spacing: 0.15em;
    margin-bottom: 5px;
  }
  .next-stage-title {
    font-family: 'Zen Kurenaido', serif;
    font-size: 18px;
    color: var(--ink);
    line-height: 1.15;
    margin-bottom: 4px;
    position: relative;
    text-shadow: 0 0 12px rgba(255,77,159,0.3);
  }
  .next-stage-title .letter {
    display: inline-block;
    animation: letterReveal 0.8s ease-out backwards;
  }
  .next-stage-title .letter:nth-child(1) { animation-delay: 0.0s; }
  .next-stage-title .letter:nth-child(2) { animation-delay: 0.1s; }
  .next-stage-title .letter:nth-child(3) { animation-delay: 0.2s; }
  .next-stage-title .letter:nth-child(4) { animation-delay: 0.3s; }
  .next-stage-title .letter:nth-child(5) { animation-delay: 0.4s; }
  .next-stage-title .letter:nth-child(6) { animation-delay: 0.5s; }
  .next-stage-title .letter:nth-child(7) { animation-delay: 0.6s; color: var(--magenta); }
  @keyframes letterReveal {
    0% { opacity: 0; transform: translateY(-8px); filter: blur(4px); }
    100% { opacity: 1; transform: translateY(0); filter: blur(0); }
  }
  .next-stage-desc {
    font-size: 10.5px;
    color: var(--ink-dim);
    line-height: 1.55;
    margin-bottom: 6px;
  }
  .next-stage-countdown {
    display: flex;
    align-items: center;
    gap: 6px;
    padding-top: 4px;
    border-top: 1px dashed rgba(0,229,255,0.25);
  }
  .countdown-label {
    font-family: 'DotGothic16', monospace;
    font-size: 8.5px;
    color: var(--cyan);
    letter-spacing: 0.15em;
  }
  .countdown-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    font-weight: 900;
    color: var(--yellow);
    text-shadow: 0 0 10px rgba(255,217,61,0.5);
  }

  /* Hide old hourglass-wrap styles (kept for compatibility but not rendered) */
  .hourglass-wrap { display: none; }

  /* =============================================================
     TETEN DIALOGUE MESSAGE STYLE
     ============================================================= */
  .msg-teten {
    align-self: flex-start;
    background: linear-gradient(135deg, rgba(124,255,176,0.16), rgba(42,159,95,0.2));
    border: 1px solid rgba(124,255,176,0.35);
    border-bottom-left-radius: 4px;
    color: var(--ink);
    max-width: 82%;
    padding: 11px 14px;
    border-radius: 18px;
    font-size: 12.5px;
    line-height: 1.65;
    animation: slideUp 0.5s ease backwards;
  }
  .msg-teten .tag {
    display: inline-block;
    font-family: 'DotGothic16', monospace;
    font-size: 9.5px;
    color: var(--teten);
    margin-bottom: 4px;
    letter-spacing: 0.1em;
  }

  /* Chat three-way mode indicator */
  .chat-mode-badge {
    display: flex; align-items: center; gap: 4px;
    padding: 2px 7px;
    background: rgba(124,255,176,0.1);
    border: 1px solid rgba(124,255,176,0.3);
    border-radius: 100px;
    font-family: 'DotGothic16', monospace;
    font-size: 9px;
    color: var(--teten);
    letter-spacing: 0.05em;
  }
  .chat-mode-badge::before {
    content: ""; width: 5px; height: 5px; border-radius: 50%;
    background: var(--teten); box-shadow: 0 0 5px var(--teten);
    animation: pulse 1.5s ease-in-out infinite;
  }

  /* ---------- Bottom Nav ---------- */
  .bottom-nav {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 86px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    background: linear-gradient(180deg, rgba(10,6,20,0.85), rgba(10,6,20,0.98));
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border-top: 1px solid rgba(255,217,61,0.25);
    padding: 10px 0 18px;
    z-index: 70;
  }
  .nav-btn {
    background: none;
    border: none;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px;
    cursor: pointer;
    color: rgba(248,238,205,0.55);
    padding: 4px 6px;
    font-family: inherit;
    transition: color 0.2s;
    position: relative;
  }
  .nav-icon {
    width: 28px; height: 28px;
    display: grid; place-items: center;
  }
  .nav-icon svg { width: 24px; height: 24px; fill: currentColor; }
  .nav-label {
    font-family: 'DotGothic16', monospace;
    font-size: 9.5px;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }
  .nav-btn.active { color: #ffd93d; font-weight: 700; }
  .nav-btn.active .nav-icon { filter: drop-shadow(0 0 6px rgba(255,217,61,0.7)); }
  .nav-btn.active::after {
    content: ""; position: absolute;
    bottom: 6px;
    width: 28px; height: 2px;
    background: #ffd93d;
    box-shadow: 0 0 6px #ffd93d;
    border-radius: 100px;
  }
  .nav-badge {
    position: absolute;
    top: 4px; right: calc(50% - 22px);
    min-width: 16px; height: 16px;
    padding: 0 4px;
    background: var(--magenta);
    color: white;
    border-radius: 100px;
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    font-weight: 700;
    display: grid; place-items: center;
    box-shadow: 0 0 8px rgba(255,77,159,0.6);
  }

  /* Animations */
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.9); }
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* Footer */
  .footer-note {
    text-align: center;
    padding: 16px;
    font-size: 11px;
    color: var(--ink-dim);
    font-family: 'DotGothic16', monospace;
    letter-spacing: 0.1em;
    position: relative; z-index: 1;
    margin-top: 20px;
  }
  .footer-note .code { color: var(--cyan); }

  @media (max-width: 1080px) {
    .stage {
      grid-template-columns: 1fr;
      gap: 40px;
      padding: 20px 16px;
    }
    .side-panel.left, .side-panel.right {
      justify-self: center;
      max-width: 420px;
    }
  }
  @media (max-width: 480px) {
    .phone { width: 100%; max-width: 380px; height: 760px; }
    .side-title { font-size: 32px; }
  }
</style>

<style>
/* ============================================================
   MOBILE FULLSCREEN OVERRIDE
   Strips phone frame, makes app fullscreen
   ============================================================ */
html, body {
  margin: 0 !important;
  padding: 0 !important;
  width: 100% !important;
  height: 100% !important;
  height: 100dvh !important;
  background: #050a1a !important;
  overflow: hidden;
  overscroll-behavior: none;
  -webkit-tap-highlight-color: transparent;
}
body::before {
  display: none !important;
}
.stage {
  display: block !important;
  padding: 0 !important;
  margin: 0 !important;
  min-height: auto !important;
  height: 100% !important;
  grid-template-columns: none !important;
  gap: 0 !important;
  max-width: none !important;
}
.stage::before { display: none !important; }
.side-panel { display: none !important; }

.phone-wrap {
  width: 100% !important;
  height: 100% !important;
  justify-self: stretch !important;
  margin: 0 !important;
}
.phone-glow { display: none !important; }

.phone {
  width: 100% !important;
  height: 100% !important;
  max-width: none !important;
  border-radius: 0 !important;
  padding: 0 !important;
  background: #050a1a !important;
  box-shadow: none !important;
  border: none !important;
}
.phone::before,
.phone::after {
  display: none !important;
}

.screen-container {
  border-radius: 0 !important;
  width: 100% !important;
  height: 100% !important;
  position: absolute;
  inset: 0;
}

/* Hide fake status bar since real phone has its own */
.status-bar { display: none !important; }

/* Adjust home screen padding since no fake status bar */
.tama-home {

}

.bottom-nav {

}

/* Prevent rubber-band scroll on iOS */
.screen {
  overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;
}
</style>

  function triggerDialogue(topic) {
    const chat = document.getElementById('chat');
    const dialogue = topicDialogues[topic];
    if (!dialogue) return;

    // Add user tap marker
    const time = document.createElement('div');
    time.className = 'msg-time msg-time-user';
    time.textContent = new Date().toLocaleTimeString('ja-JP', {hour: '2-digit', minute: '2-digit'});
    chat.appendChild(time);

    const topicLabels = { poem: '朔太郎の詩', community: '地域活動', food: '前橋グルメ', akagi: '赤城山', bentendori: '弁天通り', galyea: 'GALYEA' };
    appendMsgWithAvatar('user', topicLabels[topic] || topic, 0);

    // Play dialogue turn-by-turn
    dialogue.forEach((turn, i) => {
      const delay = 600 + i * 1400;
      appendMsgWithAvatar(turn.who, turn.text, delay);

      // If this turn has a poem card, append it after the message
      if (turn.poem) {
        setTimeout(() => {
          const chatEl = document.getElementById('chat');
          if (!chatEl) return;
          const pc = document.createElement('div');
          pc.className = 'poem-card';
          pc.style.alignSelf = 'center';
          pc.style.maxWidth = '88%';
          pc.innerHTML = `
            <div class="poem-title">${turn.poem.title}</div>
            <div class="poem-author">${turn.poem.author}</div>
            <div class="poem-body">${turn.poem.body}</div>
          `;
          chatEl.appendChild(pc);
          chatEl.scrollTop = chatEl.scrollHeight;
        }, delay + 300);
      }
    });
  }

  // Replace quick reply button handler to use dialogue system
  document.querySelectorAll('.qr-btn[data-topic]').forEach(b => {
    b.addEventListener('click', () => triggerDialogue(b.dataset.topic));

  // Teten float/bounce animation class applied during reactions
  function tetenReact(mood) {
    const tetenCharEl = document.getElementById('tetenChar');
    const tetenSpEl = document.getElementById('tetenSpeech');
    if (!tetenCharEl || !tetenSpEl) return;

    // Apply bounce based on mood
    tetenCharEl.style.animation = 'none';
    tetenCharEl.offsetHeight; // force reflow
    if (mood === 'happy') {
      tetenCharEl.style.animation = 'tetenBounce 0.6s ease-in-out 3';
    } else if (mood === 'eat') {
      tetenCharEl.style.animation = 'tetenWiggle 0.4s ease-in-out 4';
    } else if (mood === 'surprise') {
      tetenCharEl.style.animation = 'tetenShake 0.3s ease-in-out 4';
    }

    // Speech
    if (tetenMoodReactions[mood]) {
      window._tetenSpeechLock = true;
      tetenSpEl.style.opacity = 0;
      setTimeout(() => {
        tetenSpEl.innerHTML = tetenMoodReactions[mood];
        tetenSpEl.style.opacity = 1;
      }, 200);
      setTimeout(() => {
        window._tetenSpeechLock = false;
        // restore float animation
        tetenCharEl.style.animation = 'tetenFloat 4.2s ease-in-out infinite';
      }, 2800);
    }
  }

  function swapCatPose(mood, durationMs = 2500) {
    if (!moodImages[mood]) return;
    catImg.classList.add('swapping');
    setTimeout(() => {
      catImg.src = moodImages[mood];
      catImg.classList.remove('swapping');
    }, 250);
    if (moodSpeeches[mood]) {
      speechEl.innerHTML = moodSpeeches[mood];
    }
    // Trigger Teten reaction too
    tetenReact(mood);
    // Revert to master after duration
    clearTimeout(window._catMoodTimer);
    window._catMoodTimer = setTimeout(() => {
      catImg.classList.add('swapping');
      setTimeout(() => {
        catImg.src = moodImages.master;
        catImg.classList.remove('swapping');
      }, 250);
    }, durationMs);
  }

  // Build zukan pages
  const zukanPagesEl = document.getElementById('zukanPages');
  const zukanPageNumEl = document.getElementById('zukanPageNum');
  const zukanTotalEl = document.getElementById('zukanTotal');
  const zukanPrevBtn = document.getElementById('zukanPrev');
  const zukanNextBtn = document.getElementById('zukanNext');
  let zukanCurrentPage = 0;

  function renderZukan() {
    if (!zukanPagesEl) return;
    zukanPagesEl.innerHTML = '';
    zukanData.forEach((person, idx) => {
      const page = document.createElement('div');
      page.className = 'zukan-page' + (idx === 0 ? ' active' : '');
      page.dataset.pageIdx = idx;

      const imgHtml = `<div class="zukan-page-img themed" style="background: ${person.iconBg}; border-color: ${person.iconAccent};">
        <div class="zukan-icon-circle" style="border-color: ${person.iconAccent};">
          <div class="zukan-icon-emoji">${person.icon}</div>
        </div>
        <div class="zukan-icon-epnum" style="background: ${person.iconAccent};">${person.category}</div>
      </div>`;

      page.innerHTML = `
        <div class="zukan-page-number">p. ${String(idx + 1).padStart(2, '0')} / ${String(zukanData.length).padStart(2, '0')}</div>
        <div class="zukan-page-header">
          <div class="zukan-page-category">${person.category}</div>
          <div class="zukan-page-epnum">${person.epNum}</div>
        </div>
        <div class="zukan-page-portrait">
          ${imgHtml}
          <div class="zukan-page-info">
            <div class="zukan-page-name">${person.name}</div>
            <div class="zukan-page-yomi">${person.yomi}</div>
            <div class="zukan-page-role">${person.role}</div>
          </div>
        </div>
        <div class="zukan-page-body">
          ${person.body}
          ${person.sectionTitle ? `<div class="zukan-page-section-title">▸ ${person.sectionTitle}</div>${person.sectionBody}` : ''}
        </div>
        <div class="zukan-page-tags">
          ${person.tags.map(t => `<span class="zukan-page-tag">${t}</span>`).join('')}
        </div>
      `;
      zukanPagesEl.appendChild(page);
    });
    if (zukanTotalEl) zukanTotalEl.textContent = zukanData.length;
    updateZukanNav();
  }

  function updateZukanNav() {
    const pages = zukanPagesEl.querySelectorAll('.zukan-page');
    pages.forEach((p, i) => p.classList.toggle('active', i === zukanCurrentPage));
    if (zukanPageNumEl) zukanPageNumEl.textContent = zukanCurrentPage + 1;
    if (zukanPrevBtn) zukanPrevBtn.disabled = zukanCurrentPage === 0;
    if (zukanNextBtn) zukanNextBtn.disabled = zukanCurrentPage === zukanData.length - 1;
  }

  if (zukanPrevBtn) zukanPrevBtn.addEventListener('click', () => {
    if (zukanCurrentPage > 0) {
      zukanCurrentPage--;
      updateZukanNav();
    }
  });
  if (zukanNextBtn) zukanNextBtn.addEventListener('click', () => {
    if (zukanCurrentPage < zukanData.length - 1) {
      zukanCurrentPage++;
      updateZukanNav();
    }
  });

  // Swipe support for touch devices
  if (zukanPagesEl) {
    let touchStartX = 0;
    zukanPagesEl.addEventListener('touchstart', e => {
      touchStartX = e.touches[0].clientX;
    });
    zukanPagesEl.addEventListener('touchend', e => {
      const diff = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(diff) > 40) {
        if (diff < 0 && zukanCurrentPage < zukanData.length - 1) {
          zukanCurrentPage++;
          updateZukanNav();
        } else if (diff > 0 && zukanCurrentPage > 0) {
          zukanCurrentPage--;
          updateZukanNav();
        }
      }
    });
  }

  renderZukan();

  function appendRoomUser(text) {
    const row = document.createElement('div');
    row.className = 'room-msg-row user';
    row.innerHTML = `<div class="room-bubble user">${text}</div>`;
    roomChat.appendChild(row);
    roomChat.scrollTop = roomChat.scrollHeight;
  }

  function setRoomReplies(replies) {
    if (!roomReplies) return;
    roomReplies.innerHTML = '';
    roomReplies.classList.add('awaiting');
    replies.forEach(r => {
      const btn = document.createElement('button');
      btn.className = 'room-reply' + (r.style ? ' ' + r.style : '');
      btn.textContent = r.label;
      btn.addEventListener('click', () => {
        // Animate the pick: chosen pops, others fade
        const allBtns = roomReplies.querySelectorAll('.room-reply');
        allBtns.forEach(b => {
          if (b === btn) {
            b.classList.add('picked');
          } else {
            b.classList.add('faded');
          }
        });
        // Stop the spotlight
        roomReplies.classList.remove('awaiting');
        // Append user message and run action with a small delay so animation reads
        setTimeout(() => {
          if (r.userText) appendRoomUser(r.userText);
        }, 200);
        setTimeout(() => {
          if (r.action) r.action();
        }, 600);
      });
      roomReplies.appendChild(btn);
    });
  }

  // ===== Match logic: pick 2 guests based on (field, type, theme) =====
  // Each guest has tagged attributes; we score by matches across the 3 axes
  const GUEST_TAGS = {
    '渋谷さん':       { fields: ['student', 'creator'], types: ['artisan', 'challenger'], themes: ['culture', 'biz'] },
    '岡田 浩一さん':  { fields: ['community', 'worker', 'founder'], types: ['connector', 'scholar'], themes: ['local', 'culture'] },
    '後藤さん':       { fields: ['student', 'founder'], types: ['challenger', 'scholar'], themes: ['tech', 'biz'] },
    'あゆさん':       { fields: ['student', 'community'], types: ['connector', 'challenger'], themes: ['local', 'culture'] },
    'Ryutoさん':      { fields: ['student'], types: ['explorer', 'challenger'], themes: ['global', 'biz'] },
    '城戸口さん':     { fields: ['student'], types: ['scholar', 'connector'], themes: ['tech', 'dialogue'] },
    '鈴木さん':       { fields: ['worker'], types: ['connector', 'explorer'], themes: ['local', 'global'] },
    '吉田さん':       { fields: ['student', 'creator'], types: ['connector', 'artisan'], themes: ['dialogue', 'culture'] },
    '森高さん': { fields: ['founder', 'seeking'], types: ['challenger', 'explorer'], themes: ['biz', 'tech'] }
  };

  function pickTwoMatches(profile) {
    // Score each guest: 3 pts for theme match, 2 for type, 1 for field
    const scored = Object.entries(GUEST_TAGS).map(([name, tags]) => {
      let score = 0;
      if (tags.themes.includes(profile.theme)) score += 3;
      if (tags.types.includes(profile.type)) score += 2;
      if (tags.fields.includes(profile.field)) score += 1;
      return { name, score };
    });
    scored.sort((a, b) => b.score - a.score);
    // Take top 2
    const topNames = scored.slice(0, 2).map(s => s.name);
    return topNames.map(n => zukanData.find(g => g.name === n)).filter(Boolean);
  }

      ? `同ジ<b>${fieldLabels[profile.field]}</b>`
      : `同じ<b>${fieldLabels[profile.field]}</b>として共感できる部分`);

    let reasonText;
    if (isTeten) {
      reasonText = reasons.length > 0
        ? `アナタガ選ンダ ${reasons.join('・')} ト繋ガル人テテ✨`
        : `視野ガ広ガル出会イニナルテテ✨`;

        : `視野が広がる出会いになりそうにゃ✨`;

    const body = bodies[guest.name] || guest.role;
    return `${body}<br><br>${reasonText}`;

  // ===== Reveal: show 2 personalized matches with reasons =====
  async function revealMatches() {
    clearRoomReplies();
    const matches = pickTwoMatches(userProfile);
    if (matches.length < 2) {
      await appendRoomMsg('cat', 'うーん、ピッタリ見つからなかったにゃ💦 図鑑から探してみるにゃ📖', 500);

        setRoomReplies([
          { label: '📖 ひと図鑑を開く', style: 'go-zukan',

    }

    await appendRoomMsg('cat',
      'ありがとにゃ🐾<br>3つの答えから、あなたに会ってほしい人が <b style="color:#ffd93d;">2人</b> いるにゃ✨', 600);
    await appendRoomMsg('teten',
      'スキャン完了テテ🛸<br>マエアン出演ゲストカラ厳選シタ2人テテ。', 1500);

    // Show first guest
    const g1 = matches[0];
    await appendRoomMsg('cat',
      `<div style="background:rgba(255,217,61,0.15);border:1px solid rgba(255,217,61,0.5);border-radius:10px;padding:8px 10px;margin-top:4px;">

            <div style="font-weight:700;font-size:13px;color:#1a0e08;">${g1.name}</div>
            <div style="font-size:9.5px;color:#5a3a20;font-family:'DotGothic16',monospace;letter-spacing:0.1em;">${g1.category} · ${g1.epNum}</div>
          </div>
        </div>
        <div style="font-size:11.5px;color:#2a1a4a;line-height:1.55;">${explainPick(g1, userProfile, 'cat')}</div>

    const g2 = matches[1];
    await appendRoomMsg('teten',
      `<div style="background:rgba(124,255,176,0.15);border:1px solid rgba(124,255,176,0.5);border-radius:10px;padding:8px 10px;margin-top:4px;">

          <span style="font-size:24px;">${g2.icon}</span>
          <div>
            <div style="font-weight:700;font-size:13px;color:#1a3a0e;">${g2.name}</div>
            <div style="font-size:9.5px;color:#2a4a1a;font-family:'DotGothic16',monospace;letter-spacing:0.1em;">${g2.category} · ${g2.epNum}</div>
          </div>
        </div>
        <div style="font-size:11.5px;color:#1a3a0e;line-height:1.55;">${explainPick(g2, userProfile, 'teten')}</div>
      </div>`, 4700);

    await appendRoomMsg('cat',
      '図鑑でくわしいプロフィールが読めるにゃ📖<br>マエアンのエピソードも聴けるにゃ🎙️', 6900);

    setTimeout(() => {
      if (typeof reorderZukanByMatches === 'function') {

  // ===== Restart conversation =====
  function restartChat() {
    if (!roomChat) return;
    roomChat.innerHTML = '';
    userProfile.field = null;
    userProfile.type = null;
    userProfile.theme = null;
    setTimeout(() => askField(), 200);
  }

  async function goToZukan() {
    clearRoomReplies();
    await appendRoomMsg('cat', '了解にゃ🐾 ひと図鑑タブを開くにゃ。', 300);

    setTimeout(() => {
      const zukanBtn = document.querySelector('[data-target="screen-people"]');
      if (zukanBtn) zukanBtn.click();
      setTimeout(() => {
        setRoomReplies([
          { label: '↻ もう一度質問する',
            action: () => { restartChat(); }
          }
        ]);
      }, 600);
    }, 1100);
  }

  // ===== Start conversation when home is shown =====
  let roomGreetingShown = false;
  function maybeStartRoomChat() {
    if (!roomGreetingShown && roomChat && roomChat.children.length === 0) {
      roomGreetingShown = true;
      askField();
    }
  }

  const homeScreen = document.getElementById('screen-home');
  if (homeScreen) {
    const homeObserver = new MutationObserver(() => {
      if (homeScreen.classList.contains('active')) {
        setTimeout(maybeStartRoomChat, 200);
      }
    });
    homeObserver.observe(homeScreen, { attributes: true, attributeFilter: ['class'] });
    // Start immediately if home is the active screen on load
    if (homeScreen.classList.contains('active')) {
      setTimeout(maybeStartRoomChat, 600);
    }
  }

  // =============================================================
  // Reorder zukan pages based on matched guests (used by chat flow)
  // =============================================================
  function reorderZukanByMatches(matched) {
    if (!matched || !matched.length) return;
    const matchedSet = new Set(matched);
    const remaining = zukanData.filter(g => !matchedSet.has(g));
    zukanData.length = 0;
    matched.forEach(g => zukanData.push(g));
    remaining.forEach(g => zukanData.push(g));
    zukanCurrentPage = 0;
    if (typeof renderZukan === 'function') renderZukan();
  }

  // ===== Paw Stamp System (kept for future compatibility but paw badges hidden since people tab redesigned) =====
  const PAW_STAMPS = {
    capacity: 4,
    collected: new Set()
  };
  const pawCountEl = document.getElementById('pawCount');
  const pawCountWalletEl = document.getElementById('pawCountWallet');
  const pawCollectionEl = document.getElementById('pawCollection');

  function renderPawCollection() {
    const count = PAW_STAMPS.collected.size;
    if (pawCountEl) pawCountEl.textContent = count;
    if (pawCountWalletEl) pawCountWalletEl.textContent = count;
    if (pawCollectionEl) {
      pawCollectionEl.innerHTML = '';
      for (let i = 0; i < PAW_STAMPS.capacity; i++) {
        const slot = document.createElement('div');
        const isFilled = i < count;
        slot.className = 'paw-slot' + (isFilled ? ' filled' : '');
        slot.textContent = isFilled ? '🐾' : '·';
        pawCollectionEl.appendChild(slot);
      }
    }
  }
  renderPawCollection();

  function triggerPawStamp(personKey) {
    if (PAW_STAMPS.collected.has(personKey)) return false;
    PAW_STAMPS.collected.add(personKey);
    renderPawCollection();
    return true;
  }

  // ===== Today Modal =====
  const todayModal = document.getElementById('todayModal');
  const todayClose = document.getElementById('todayClose');
  const btnToday = document.getElementById('btnToday');

  if (btnToday) {
    btnToday.addEventListener('click', () => {
      todayModal.classList.add('open');
      // Cat reacts
      const speechEl2 = document.getElementById('catSpeech');
      if (speechEl2) {
        clearTimeout(window._catMoodTimer);
        speechEl2.style.opacity = 0;
        setTimeout(() => {
          speechEl2.innerHTML = 'きょうの前橋を開くにゃ📅';
          speechEl2.style.opacity = 1;
        }, 150);
        window._catMoodTimer = setTimeout(() => { window._catMoodTimer = null; }, 3500);
      }
    });
  }
  if (todayClose) todayClose.addEventListener('click', () => todayModal.classList.remove('open'));
  if (todayModal) todayModal.addEventListener('click', e => {
    if (e.target === todayModal) todayModal.classList.remove('open');
  });

  // ===== Teten Speech Rotation on Home screen =====

    '前橋スキャン中テテ',

    setInterval(() => {
      if (window._tetenSpeechLock) return;
      tetenSpeechIdx = (tetenSpeechIdx + 1) % tetenSpeeches.length;
      tetenSpeechEl.style.opacity = 0;
      setTimeout(() => {
        tetenSpeechEl.innerHTML = tetenSpeeches[tetenSpeechIdx];
        tetenSpeechEl.style.opacity = 1;
      }, 300);
    }, 6000);
    // Set initial speech
    tetenSpeechEl.innerHTML = tetenSpeeches[0];
  }

  // Teten click: show short reaction
  const tetenChar = document.getElementById('tetenChar');
  if (tetenChar && tetenSpeechEl) {
    tetenChar.addEventListener('click', (e) => {
      e.stopPropagation();
      window._tetenSpeechLock = true;
      tetenSpeechEl.style.opacity = 0;
      setTimeout(() => {
        tetenSpeechEl.innerHTML = 'ヨロシクテテ🛸';
        tetenSpeechEl.style.opacity = 1;

      setTimeout(() => { window._tetenSpeechLock = false; }, 3500);

      comment: '大正6年（1917年）に刊行された朔太郎のデビュー詩集にゃ。日本の近代詩に口語自由詩を根付かせた、文学史的に超重要な一冊。「月」「夜」「犬」「竹」などのモチーフが繰り返し現れるにゃ🌙'

      comment: 'シンプルな言葉の繰り返しだけで、地中から地上へと伸びていく竹の生命力と緊張感を表現した傑作にゃ。朔太郎の代表作の一つで、教科書にも載ってるにゃ🎋'
    },
    'neko-machi': {
      title: '猫町（ねこまち）',
      author: '萩原朔太郎 / 幻想小説「猫町」より',
      body: 'ふとした事から、私は自分の住んでゐる町とは、\nまるきり別の、見知らない町へ迷ひ込んでしまつた。\n\nあらゆる家屋の屋根や窓から、\n猫の大集団が、ぞろぞろと這ひ出してきた。\n猫！猫！猫！猫！猫！猫！猫！\nどこを見ても猫ばかりゐる。\n\n（※ 本作品は小説、一部のみ掲載）',
      comment: '小説だけど青猫の世界観と地続きにゃ。日常の裏側にもう一つの世界があるという発想は、マエバシ・ダイブの謎解きにも通じるにゃ。青猫シリーズの原点のひとつだと青猫は思ってるにゃ🌀'
    }
  };

  const poemModalEl = document.getElementById('poemModal');
  const poemCloseBtn = document.getElementById('poemClose');
  document.querySelectorAll('.book[data-poem], .poem-tile').forEach(tile => {
    tile.addEventListener('click', () => {
      const key = tile.dataset.poem;
      const p = poemData[key];
      if (!p) return;
      document.getElementById('poemModalTitle').textContent = p.title;
      document.getElementById('poemModalAuthor').textContent = p.author;
      document.getElementById('poemModalBody').textContent = p.body;
      const commentEl = document.getElementById('poemModalComment');
      commentEl.innerHTML = `
        <div style="font-family: 'DotGothic16', monospace; font-size: 9.5px; color: var(--cyan); letter-spacing: 0.1em; margin-bottom: 4px;">▸ 青猫のひとこと</div>

      poemModalEl.classList.add('open');
    });
  });
  if (poemCloseBtn) poemCloseBtn.addEventListener('click', () => poemModalEl.classList.remove('open'));
  if (poemModalEl) poemModalEl.addEventListener('click', e => {
    if (e.target === poemModalEl) poemModalEl.classList.remove('open');
  });

  // Close poem modal on nav switch too
  navBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      if (poemModalEl) poemModalEl.classList.remove('open');
    });
  });
</script>
